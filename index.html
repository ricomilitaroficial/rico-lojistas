        const normalizeUF = (uf) => {
            if (!uf || typeof uf !== 'string') return null;
            let clean = uf.trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            if (BRAZIL_STATES.includes(clean)) return clean;
            if (UF_MAP[clean]) return UF_MAP[clean];

            // Busca sigla solta no texto (ex: "SÁƒO PAULO - SP")
            const words = clean.split(/[\s-]+/);
            for (const word of words) {
                if (BRAZIL_STATES.includes(word)) return word;
            }

            return null; // Se não for um estado conhecido, ignora
        };

            try {
                const res0 = await fetch(`https://minhareceita.org/${cnpjNum}`);
                if (res0.ok) {
                    const data = await res0.json();
                    const cnaeCode = String(data.cnae_fiscal || '');
                    const nat = String(data.porte || '').toLowerCase();
                    return {
                        officialName: data.razao_social || '',
                        cnae: cnaeCode,
                        cnaeDesc: data.cnae_fiscal_descricao || '',
                        type: data.porte || '',
                        isMei: cnaeCode.startsWith('8699') || nat.includes('micro empresa')
                    };
                }
                if (res0.status === 429) err429 = true;

                    };

               if (lead.isMei) {
                   score += 20; // MEI é prioridade média-baixa se não for do ramo
               } else {
                   score += 50; // Empresa padrão (LTDA, SA) ganha boa base
               }
            } else if (taxId.length === 11) {
               score += 5; // CPF é a menor prioridade
            }

            // 2. PRIORIDADE POR RAMO (FOCO TOTAL: MILITAR/AVENTURA)
            const textToSearch = `${lead.company || ''} ${lead.contact || ''} ${lead.obs || ''} ${lead.officialName || ''} ${lead.cnaeDesc || ''}`.toLowerCase();
            let branchMatch = 0;
            
            // Foco Total (+30 cada)
            ['militar', 'aventura', 'tatico', 'tática', 'especializada', 'airsoft', 'paintball', 'operacional'].forEach(kw => {
                if (textToSearch.includes(kw)) branchMatch += 30;
            });
            
            // Artigos de Caça/Pesca (+10 cada - Prioridade Menor)
            ['caça', 'pesca', 'camping', 'pescador', 'anzol', 'iscas'].forEach(kw => {
                if (textToSearch.includes(kw)) branchMatch += 10;
            });
            
            // Bonus por CNAE Oficial
            const MILITARY_CNAES = ['4763', '4781', '4782', '1412', '1413'];
            
            if (lead.cnae) {
                if (MILITARY_CNAES.some(c => String(lead.cnae).startsWith(c))) branchMatch += 20;
                else branchMatch += 5; // outro CNAE (caça/pesca) pontua menos
            }
            
            score += Math.min(60, branchMatch); // O ramo pode dar até 60 pontos no total

            // 3. REGIONALIDADE (ESTADO/CIDADE)
            const st = normalizeUF(lead.state);
            if (st && profile.states[st]) {
                const stateFrequency = profile.states[st] / profile.counts.total;
                score += Math.min(10, Math.floor(stateFrequency * 40)); 
            }

            return Math.min(99, Math.max(10, score));
        };

        // --- HOOK DE DADOS FIREBASE (CORRIGIDO PARA PERSISTÁŠNCIA) ---
        const useFirebaseData = (collectionName, initialData = [], user) => {
            const [data, setData] = useState(initialData);
            const [loading, setLoading] = useState(true);

            // Caminho FIXO para os dados não sumirem
            // Antes era: ... 'users', user.uid, collectionName
            // Agora é:   ... 'public', 'data', collectionName

            useEffect(() => {
                if (!window.db || !window.firebaseStore || !window.appId || !user) {
                    return;
                }

                const { collection, onSnapshot } = window.firebaseStore;
                // MUDANÁ‡A AQUI:
                const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', collectionName);

                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setData(items);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [collectionName, user]);

            const addItem = async (item) => {
                if (!window.db || !user) { setData(prev => [...prev, { ...item, id: Date.now() }]); return; }
                const { collection, addDoc } = window.firebaseStore;
                const { id, ...dataToSave } = item;
                // Limpeza recursiva de undefined para evitar crash no Firestore
                const cleanData = JSON.parse(JSON.stringify(dataToSave));
                // MUDANÁ‡A AQUI:
                await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', collectionName), cleanData);
            };

            const updateItem = async (item) => {
                if (!window.db || !user) { setData(prev => prev.map(i => i.id === item.id ? item : i)); return; }
                const { doc, updateDoc } = window.firebaseStore;
                const { id, ...dataToSave } = item;
                // Limpeza recursiva de undefined para evitar crash no Firestore
                const cleanData = JSON.parse(JSON.stringify(dataToSave));
                // MUDANÁ‡A AQUI:
                const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', collectionName, String(id));
                await updateDoc(docRef, cleanData);
            };

            const deleteItem = async (id) => {
                if (!window.db || !user) { setData(prev => prev.filter(i => i.id !== id)); return; }
                const { doc, deleteDoc } = window.firebaseStore;
                // MUDANÁ‡A AQUI:
                const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', collectionName, String(id));
                await deleteDoc(docRef);
            };

            return { data, loading, addItem, updateItem, deleteItem };
        };

        // --- CHART COMPONENT ---
        const ChartComponent = ({ type, data, options, height = 300, labelType = 'value' }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                if (chartRef.current) chartRef.current.destroy();

                Chart.defaults.color = '#94a3b8';
                Chart.defaults.borderColor = '#334155';
                Chart.defaults.font.family = "'Red Hat Display', sans-serif";
                Chart.defaults.datasets.bar.barPercentage = 0.85;
                Chart.defaults.datasets.bar.categoryPercentage = 0.75;
                Chart.register(ChartDataLabels);

                chartRef.current = new Chart(canvasRef.current.getContext('2d'), {
                    type, data,
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        layout: { padding: { top: 30, right: 35, left: (options?.indexAxis === 'y' && data.labels?.some(l => l.toString().length > 3)) ? 120 : 45, bottom: 10 } },
                        scales: (type !== 'pie' && type !== 'doughnut') ? { 
                            x: { 
                                grid: { color: 'rgba(255,255,255,0.05)' }, 
                                ticks: { color: '#94a3b8', font: { size: 10 } },
                                beginAtZero: true
                            }, 
                            y: { 
                                type: options?.indexAxis === 'y' ? 'category' : undefined,
                                display: true, 
                                grid: { display: false }, 
                                ticks: { 
                                    color: '#e2e8f0', 
                                    font: { weight: 'bold', size: 10 },
                                    padding: 10
                                } 
                            } 
                        } : { x: { display: false }, y: { display: false } },
                        ...options,
                        plugins: {
                            ...options?.plugins,
                            legend: { 
                                display: true, 
                                position: 'bottom',
                                labels: { color: '#e2e8f0', usePointStyle: true, boxWidth: 8, padding: 20 } 
                            },
                                datalabels: {
                                    ...options?.plugins?.datalabels,
                                    color: '#fff', 
                                    anchor: 'end', 
                                    align: 'top', 
                                    offset: 4,
                                    display: true,
                                    rotation: 0,
                                    clip: false,
                                    font: { weight: 'bold', size: 8 },
                                    formatter: (val, ctx) => {
                                        if (val === 0 || val === "0.00") return null;
                                        let label = val;
                                        if (labelType === 'money') {
                                            if (val >= 1000) label = (val / 1000).toFixed(1) + 'k';
                                            else label = val;
                                        }
                                        if (labelType === 'roi') label = val + 'x';
                                        if (labelType === 'percent') label = val + '%';
                                        
                                        if (type === 'pie' || type === 'doughnut') {
                                            const dataset = ctx.chart.data.datasets[0];
                                            const total = dataset.data.reduce((acc, curr) => acc + curr, 0);
                                            const percent = total > 0 ? ((val / total) * 100).toFixed(1) + '%' : '0%';
                                            return [label, `(${percent})`];
                                        }
                                        return label;
                                    }
                                }
                        }
                    }
                });
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [type, data, options]);

            return <div style={{ height, width: '100%' }}><canvas ref={canvasRef}></canvas></div>;
        };

                                                            <button onClick={() => { setEditingRep(item); setRepFormData({ ...item }); setActiveTab('repurchase'); }} className="p-2 hover:bg-slate-700 rounded-lg text-blue-400" title="Editar Recompra"><Edit2 size={16} /></button>
                                                            <button onClick={() => { if(confirm('Excluir recompra?')) onDeleteRepurchase(item.id); }} className="p-2 hover:bg-slate-700 rounded-lg text-red-400" title="Excluir Recompra"><Trash2 size={16} /></button>
                                                        </>

                                                        <button onClick={() => setActiveTab('data')} className="p-2 hover:bg-slate-700 rounded-lg text-amber-500" title="Editar Dados Principais"><Edit2 size={16} /></button>

                                                </div>
                                            </div>

                                    </div>
                                </div>

                            {activeTab === 'repurchase' && (

                                        <h4 className="text-emerald-500 text-[10px] font-black uppercase tracking-widest border-b border-emerald-500/20 pb-2 flex items-center gap-2">
                                            <RefreshCw size={14} /> {editingRep ? 'Editando Recompra' : 'Nova Recompra'}
                                        </h4>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="block text-[10px] uppercase mb-1 text-slate-500 font-bold">Data da Recompra</label><input type="date" required className="input-dark" value={repFormData.date || ''} onChange={e => setRepFormData({ ...repFormData, date: e.target.value })} /></div>
                                            <div><label className="block text-[10px] uppercase mb-1 text-slate-500 font-bold">Quantidade de Pares</label><input type="number" required className="input-dark" value={repFormData.pairs || ''} onChange={e => setRepFormData({ ...repFormData, pairs: e.target.value })} /></div>
                                        </div>
                                        <div><label className="block text-[10px] uppercase mb-1 text-slate-500 font-bold">Valor da Venda (R$)</label><input type="number" step="0.01" required className="input-dark" value={repFormData.value || ''} onChange={e => setRepFormData({ ...repFormData, value: e.target.value })} /></div>
                                        <div><label className="block text-[10px] uppercase mb-1 text-slate-500 font-bold">Observações Internas</label><textarea className="input-dark h-24" placeholder="Algum detalhe específico desta recompra?" value={repFormData.obs || ''} onChange={e => setRepFormData({ ...repFormData, obs: e.target.value })}></textarea></div>
                                        
                                        <div className="flex gap-3 pt-2">
                                            {editingRep && (
                                                <button type="button" onClick={() => { setEditingRep(null); setRepFormData({ date: new Date().toISOString().split('T')[0], value: '', pairs: '', obs: '' }); }} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 rounded-xl transition-all">Cancelar Edição</button>
                                            )}
                                            <button type="submit" className="flex-[2] bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-xl shadow-emerald-900/20 transition-all active:scale-[0.98]">
                                                {editingRep ? 'Atualizar Recompra' : 'Confirmar Recompra'}
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const MatchThermometer = ({ score }) => {
            const getColor = (s) => {
                if (s < 30) return 'bg-red-600';
                if (s < 50) return 'bg-orange-500';
                if (s < 70) return 'bg-yellow-500';
                if (s < 85) return 'bg-lime-500';
                return 'bg-emerald-500';
            };

            return (
                <div className="w-full mt-2 animate-fadeIn" title={`Match de Perfil: ${score}%`}>
                    <div className="flex justify-between items-center mb-1 px-0.5">
                        <span className="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Match Ideal</span>
                        <span className={`text-[10px] font-black ${getColor(score).replace('bg-', 'text-')}`}>{score}%</span>
                    </div>
                    <div className="h-2 w-full bg-slate-800/80 rounded-sm overflow-hidden border border-slate-700/30 p-[1px]">
                        <div 
                            className={`h-full ${getColor(score)} rounded-sm transition-all duration-1000 ease-out`} 
                            style={{ width: `${score}%`, boxShadow: '0 0 10px rgba(0,0,0,0.2)' }}
                        ></div>
                    </div>
                </div>
            );
        };

        const LeadAnalyticsView = ({ sales, leads, ads }) => {
            const [filterDate, setFilterDate] = useState('all');

            const availableMonths = useMemo(() => {
                const months = new Set([
                    ...sales.map(s => s.date.slice(0, 7)),
                    ...ads.map(a => a.month),
                    ...leads.map(l => l.date.slice(0, 7))
                ]);
                return Array.from(months).sort();
            }, [sales, ads, leads]);

            const data = useMemo(() => {
                let filteredSales = sales;
                let filteredAds = ads;
                let filteredLeads = leads;

                if (filterDate !== 'all') {
                    filteredSales = sales.filter(s => s.date.startsWith(filterDate));
                    filteredAds = ads.filter(a => a.month === filterDate);
                    filteredLeads = leads.filter(l => l.date.startsWith(filterDate));
                }

                const totalLeads = filteredLeads.length;
                const totalSales = filteredSales.length;
                const totalAds = filteredAds.reduce((acc, a) => acc + a.value, 0);

                const cpl = totalLeads > 0 ? totalAds / totalLeads : 0;
                const conversionRate = totalLeads > 0 ? (totalSales / totalLeads) * 100 : 0;
                const conversionRatio = totalSales > 0 ? Math.round(totalLeads / totalSales) : 0;

                const monthsCount = filterDate === 'all' ? availableMonths.length : 1;
                const avgLeadsPerMonth = monthsCount > 0 ? totalLeads / monthsCount : 0;

                const monthsList = filterDate === 'all' ? availableMonths : [filterDate];
                const monthlyData = monthsList.map(m => {
                    const mLeads = leads.filter(l => l.date.startsWith(m)).length;
                    const mSales = sales.filter(s => s.date.startsWith(m)).length;
                    const mAds = ads.find(a => a.month === m)?.value || 0;
                    const mCpl = mLeads > 0 ? mAds / mLeads : 0;
                    const mRate = mLeads > 0 ? (mSales / mLeads) * 100 : 0;

                    const [y, mn] = m.split('-');
                    const label = `${fullMonthNames[parseInt(mn) - 1].substring(0, 3)}/${y.substring(2)}`;

                    return { label, leads: mLeads, sales: mSales, cpl: mCpl, rate: mRate };
                });

                const leadsByState = {};
                const leadsByRegion = {};
                const leadsBySource = {};
                const leadsByStatus = { 'new': 0, 'contacted': 0, 'qualified': 0, 'converted': 0, 'lost': 0 };
                const leadsByDay = {};

                filteredLeads.forEach(l => {
                    // Geo
                    const st = normalizeUF(l.state);
                    if (st) {
                        leadsByState[st] = (leadsByState[st] || 0) + 1;
                        const reg = Object.keys(REGIONS).find(r => REGIONS[r].includes(st));
                        if (reg) {
                            leadsByRegion[reg] = (leadsByRegion[reg] || 0) + 1;
                        }
                    }
                    // Source
                    const src = l.source || 'Desconhecido';
                    leadsBySource[src] = (leadsBySource[src] || 0) + 1;

                    // Status
                    if (l.status) leadsByStatus[l.status] = (leadsByStatus[l.status] || 0) + 1;

                    // Day Trend
                    leadsByDay[l.date] = (leadsByDay[l.date] || 0) + 1;
                });

                // Ordenação por Estado (Pareto)
                const sortedStates = Object.entries(leadsByState).sort((a, b) => b[1] - a[1]);
                const sortedStateLabels = sortedStates.map(s => s[0]);
                const sortedStateValues = sortedStates.map(s => s[1]);

                // Ordenação por Data (Últimos 30 dias se muitos)
                const sortedDays = Object.keys(leadsByDay).sort().slice(-30); // Últimos 30 dias registrados
                const trendData = sortedDays.map(d => leadsByDay[d]);
                const trendLabels = sortedDays.map(d => {
                    const parts = d.split('-');
                    return `${parts[2]}/${parts[1]}`;
                });

                return {
                    kpis: { totalLeads, cpl, conversionRate, conversionRatio, totalAds, totalSales, avgLeadsPerMonth },
                    monthly: monthlyData,
                    geo: { state: { labels: sortedStateLabels, values: sortedStateValues }, region: leadsByRegion },
                    bi: { source: leadsBySource, status: leadsByStatus, trend: { labels: trendLabels, values: trendData } }
                };
            }, [sales, leads, ads, filterDate, availableMonths]);

            const cLeadsMonth = {
                labels: data.monthly.map(d => d.label),
                datasets: [
                    { type: 'line', label: 'Taxa Conv. (%)', data: data.monthly.map(d => d.rate.toFixed(1)), borderColor: '#8b5cf6', backgroundColor: '#8b5cf6', yAxisID: 'y1', order: 0 },
                    { type: 'bar', label: 'Leads', data: data.monthly.map(d => d.leads), backgroundColor: '#3b82f6', borderRadius: 4, order: 1 },
                    { type: 'bar', label: 'Vendas', data: data.monthly.map(d => d.sales), backgroundColor: '#10b981', borderRadius: 4, order: 1 }
                ]
            };

            const cCplMonth = {
                labels: data.monthly.map(d => d.label),
                datasets: [
                    { label: 'Custo por Lead (CPL)', data: data.monthly.map(d => d.cpl.toFixed(2)), backgroundColor: '#f59e0b', borderRadius: 4, type: 'bar' }
                ]
            };

            const cLeadsRegion = {
                labels: Object.keys(data.geo.region),
                datasets: [{
                    data: Object.values(data.geo.region),
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'],
                    borderWidth: 0
                }]
            };

            const cLeadsState = {
                labels: data.geo.state.labels,
                datasets: [{
                    label: 'Leads por Estado',
                    data: data.geo.state.values,
                    backgroundColor: '#3b82f6',
                    borderRadius: 4
                }]
            };

            return (
                <div className="animate-fadeIn">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <h2 className="text-2xl font-bold text-white uppercase flex items-center gap-2">
                            <PieChart className="text-blue-500" /> Inteligência de Leads (BI)
                        </h2>
                        <div className="flex items-center gap-2 bg-slate-900 p-1 rounded-lg border border-slate-700">
                            <span className="text-slate-400 text-xs font-bold uppercase px-3">Período:</span>
                            <select
                                className="bg-slate-800 text-white text-sm border-none rounded py-1 px-3 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer"
                                value={filterDate}
                                onChange={(e) => setFilterDate(e.target.value)}
                            >
                                <option value="all">Visão Consolidada (Todos)</option>
                                {availableMonths.map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                        <KpiCard title="Total de Leads" value={data.kpis.totalLeads} subtext="No período selecionado" icon={Filter} colorClass="border-blue-500" />
                        <KpiCard title="Custo por Lead (CPL)" value={fmtMoney(data.kpis.cpl)} subtext="Investimento / Leads" icon={DollarSign} colorClass="border-amber-500" />
                        <KpiCard title="Taxa de Conversão" value={data.kpis.conversionRate.toFixed(1) + '%'} subtext={`1 venda a cada ${data.kpis.conversionRatio} leads`} icon={Target} colorClass="border-emerald-500" />
                        <KpiCard title="Investimento Total" value={fmtMoney(data.kpis.totalAds)} subtext="Gasto em Anúncios" icon={Wallet} colorClass="border-slate-500" />
                        <KpiCard title="Média Leads/Mês" value={data.kpis.avgLeadsPerMonth.toFixed(1)} subtext="Média do período" icon={Activity} colorClass="border-cyan-500" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Linha 1: Evolução e Custo */}
                        <div className="lg:col-span-2">
                            <ChartContainer title="Evolução Mensal (Funil Macro)" subtitle="Comparativo Leads vs Vendas">
                                <ChartComponent type="bar" data={cLeadsMonth} options={{ scales: { y: { display: false }, y1: { type: 'linear', display: false, position: 'right', grid: { drawOnChartArea: false } } } }} />
                            </ChartContainer>
                        </div>
                        <ChartContainer title="Custo por Lead (CPL)" subtitle="Eficiência do investimento (R$)">
                            <ChartComponent type="bar" data={cCplMonth} labelType="money" />
                        </ChartContainer>

                        {/* Linha 3: Geo Detalhado */}
                        <ChartContainer title="Distribuição Regional" subtitle="Leads por Região">
                            <div className="flex justify-center h-48">
                                <ChartComponent type="doughnut" data={cLeadsRegion} labelType="percent" />
                            </div>
                        </ChartContainer>

                        <div className="lg:col-span-2">
                            <ChartContainer title="Ranking de Estados" subtitle="Leads por UF (Maior para Menor)">
                                <ChartComponent type="bar" data={cLeadsState} />
                            </ChartContainer>
                        </div>
                        <div className="lg:col-span-3">
                            <LeadEfficiencyChart sales={sales} leads={leads} />
                        </div>
                    </div>
                </div>
            );
        };

        const LeadsView = ({ leads, sales, addItem, updateItem, deleteSale, onConvertToSale, clearNotification, onSync, apiUrl, profile }) => {
            const [syncing, setSyncing] = useState(false);
            const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });

            // Pagination state
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(50);

            useEffect(() => {
                clearNotification();
            }, []);

            const handleUndoConvert = async (lead) => {
                await updateItem({ ...lead, status: 'contacted' });
                if (sales && deleteSale) {
                    const saleToRemove = sales.find(s => String(s.leadId) === String(lead.id));
                    if (saleToRemove) {
                        await deleteSale(saleToRemove.id);
                    }
                }
            };

            const handleManualCnpjLookup = async (e, lead) => {
                e.stopPropagation();
                const cnpj = String(lead.cnpj).replace(/\D/g, '');
                if (cnpj.length !== 14) {
                    alert('CNPJ inválido ou formato incorreto.');
                    return;
                }
                
                // Show loading immediately
                updateItem({ ...lead, isConsulting: true, cnpjError: false, cnpjConsulted: false });
                
                try {
                    const parsedData = await fetchCnpjData(cnpj);
                    await updateItem({
                        ...lead,
                        ...parsedData,
                        cnpjConsulted: true,
                        isConsulting: false,
                        cnpjError: false
                    });
                } catch (err) {
                    console.error('Erro na consulta manual:', err);
                    if (err.message === "429") {
                        alert("Servidores do governo sobrecarregados (Erro 429). Tente novamente em 1 minuto.");
                        await updateItem({ ...lead, isConsulting: false, cnpjError: true });
                    } else {
                        alert("CNPJ " + cnpj + " é inválido (não existe na Receita Federal). Edite o lead e corrija.");
                        await updateItem({ ...lead, cnpjConsulted: true, isConsulting: false, cnpjError: true });
                    }
                }
            };

            const handleSyncClick = async () => {
                setSyncing(true);
                await onSync();
                setSyncing(false);
            };

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const sortedLeads = useMemo(() => {
                let items = [...leads];
                items.sort((a, b) => {
                    let aValue = a[sortConfig.key];
                    let bValue = b[sortConfig.key];
                    if (sortConfig.key === 'date') { aValue = new Date(aValue); bValue = new Date(bValue); }
                    if (typeof aValue === 'string') { aValue = aValue.toLowerCase(); bValue = bValue.toLowerCase(); }
                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return items;
            }, [leads, sortConfig]);

            // Pagination Logic
            const totalPages = Math.ceil(sortedLeads.length / itemsPerPage);
            const paginatedLeads = sortedLeads.slice(
                (currentPage - 1) * itemsPerPage,
                currentPage * itemsPerPage
            );

            const SortIcon = ({ column }) => { if (sortConfig.key !== column) return null; return sortConfig.direction === 'asc' ? <ChevronUp size={14} className="ml-1 inline" /> : <ChevronDown size={14} className="ml-1 inline" />; };

            return (
                <div className="animate-fadeIn">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-white">Funil de Leads (Google Forms)</h2>
                            <div className="flex items-center gap-2 mt-1">
                                <p className="text-slate-400 text-sm flex items-center gap-2">
                                    <span className={`w-2 h-2 rounded-full ${apiUrl ? 'bg-emerald-500' : 'bg-amber-500'} animate-pulse`}></span>
                                    {apiUrl ? 'Conectado Á  API Google Sheets' : 'Modo Simulação (Demo)'}
                                </p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 text-xs text-slate-400 bg-slate-800 px-3 py-1.5 rounded border border-slate-700">
                                <label>Exibir:</label>
                                <select
                                    value={itemsPerPage}
                                    onChange={(e) => { setItemsPerPage(Number(e.target.value)); setCurrentPage(1); }}
                                    className="bg-transparent text-white font-bold outline-none drop-shadow focus:ring-0"
                                >
                                    <option value={50} className="bg-slate-800">50</option>
                                    <option value={100} className="bg-slate-800">100</option>
                                    <option value={200} className="bg-slate-800">200</option>
                                    <option value={100000} className="bg-slate-800">Todos</option>
                                </select>
                            </div>
                            <button
                                onClick={handleSyncClick}
                                disabled={syncing}
                                className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded flex items-center gap-2 text-sm font-bold shadow-lg shadow-blue-900/20 disabled:opacity-50 transition-all"
                            >
                                <RefreshCw size={18} className={syncing ? "animate-spin" : ""} />
                                {syncing ? 'Sincronizando...' : 'Sincronizar Agora'}
                            </button>
                        </div>
                    </div>

                    <div className="glass-panel rounded-lg overflow-hidden flex flex-col mb-6">
                        <div className="overflow-x-auto custom-scrollbar transition-all">
                            <table className="w-full text-[13px] text-left text-slate-400">
                                <thead className="text-[11px] text-slate-200 uppercase bg-slate-800/95 sticky top-0 z-20 backdrop-blur-sm border-b border-slate-700 shadow-md">
                                    <tr>
                                        <th className="px-2 py-3 sortable w-[65px] text-center sticky top-0 bg-slate-800" onClick={() => handleSort('date')}>Data <SortIcon column="date" /></th>
                                        <th className="px-2 py-3 sortable w-[110px] text-center sticky top-0 bg-slate-800" onClick={() => handleSort('contact')}>Nome <SortIcon column="contact" /></th>
                                        <th className="px-2 py-3 w-[90px] text-center sticky top-0 bg-slate-800">WhatsApp</th>
                                        <th className="px-2 py-3 sortable w-[85px] text-center sticky top-0 bg-slate-800" onClick={() => handleSort('state')}>Local <SortIcon column="state" /></th>
                                        <th className="px-2 py-3 w-[120px] text-center sticky top-0 bg-slate-800">Lojista/CNPJ</th>
                                        <th className="px-2 py-3 w-[130px] text-center sticky top-0 bg-slate-800">E-mail</th>
                                        <th className="px-2 py-3 w-[150px] text-center sticky top-0 bg-slate-800">Endereço</th>
                                        <th className="px-2 py-3 min-w-[120px] text-center sticky top-0 bg-slate-800">Obs</th>
                                        <th className="px-2 py-3 text-center w-[75px] sticky right-0 top-0 bg-slate-800 z-30 shadow-[-5px_0_10px_rgba(0,0,0,0.2)]">Ação</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700/50">
                                    {paginatedLeads.map((lead) => (
                                        <tr key={lead.id} className="hover:bg-slate-800/30 transition-colors animate-fadeIn group">
                                            <td className="px-3 py-4 font-mono text-[11px] text-slate-400 align-top text-center">{fmtDate(lead.date)}</td>
                                            <td className="px-3 py-4 align-top whitespace-normal break-words">
                                                <div className="font-bold text-white text-[13px] leading-tight flex items-center gap-1">
                                                    {calculateMatchScore(lead, profile) >= 90 && (
                                                        <span title="Lead de alto potencial! Match acima de 90%" className="text-yellow-400 text-[14px] leading-none" style={{textShadow:'0 0 8px rgba(250,204,21,0.8)'}}>★</span>
                                                    )}
                                                    {lead.contact}
                                                </div>
                                                <div className="flex flex-wrap gap-1 mt-1.5 line-clamp-1">
                                                    {lead.isNew && <span className="text-[9px] bg-red-600/90 text-white px-1.5 py-0.5 rounded uppercase font-bold tracking-tight animate-pulse">NOVO</span>}
                                                    {lead.status === 'read' && <span className="text-[9px] bg-slate-700/80 text-slate-400 px-1.5 py-0.5 rounded uppercase font-bold tracking-tight border border-slate-600/30">LIDO</span>}
                                                    {['contacted', 'negotiating', 'qualified'].includes(lead.status) && (
                                                        <button 
                                                            onClick={(e) => {
                                                                e.stopPropagation();
                                                                updateItem({ ...lead, status: 'new', isNew: true });
                                                            }}
                                                            className="text-[9px] bg-amber-500/20 text-amber-500 hover:bg-slate-700/80 hover:text-slate-400 px-1.5 py-0.5 rounded uppercase font-bold tracking-tight border border-amber-500/30 hover:border-slate-600/30 transition-colors cursor-pointer"
                                                            title="Clique para remover do CRM (Voltar para NOVO)"
                                                        >
                                                            EM CRM
                                                        </button>
                                                    )}
                                                    {lead.status === 'converted' && <span className="text-[9px] bg-emerald-500/20 text-emerald-500 px-1.5 py-0.5 rounded uppercase font-bold tracking-tight border border-emerald-500/30">VENDIDO</span>}
                                                </div>
                                                <MatchThermometer score={calculateMatchScore(lead, profile)} />
                                            </td>
                                            <td className="px-3 py-4 align-top text-center whitespace-normal">
                                                {lead.phone ? (
                                                    <a
                                                        href={`https://wa.me/${String(lead.phone).replace(/\D/g, '')}`}
                                                        target="wa_rico"
                                                        onClick={() => {
                                                            if (['new', 'read'].includes(lead.status) || lead.isNew) {
                                                                updateItem({ ...lead, isNew: false, status: 'contacted' });
                                                            }
                                                        }}
                                                        className="inline-flex items-center gap-1 text-emerald-400 hover:text-emerald-300"
                                                    >
                                                        <Phone size={12} /> <span className="text-[12px]">{lead.phone}</span>
                                                    </a>
                                                ) : <span className="text-slate-600">-</span>}
                                            </td>
                                            <td className="px-3 py-4 align-top whitespace-normal">
                                                <div className="text-white font-medium text-center">{lead.state || '?'}</div>
                                                <div className="text-[11px] text-slate-500 text-center">{lead.city}</div>
                                            </td>
                                            <td className="px-3 py-4 align-top whitespace-normal">
                                                <div className="text-slate-200 font-medium leading-tight">{lead.company}</div>
                                                <div className="text-[11px] font-mono text-slate-500 mt-1 flex flex-col gap-1 items-start">
                                                    <span>{lead.cnpj}</span>
                                                    {!lead.officialName && String(lead.cnpj).replace(/\D/g, '').length === 14 && (
                                                        <button 
                                                            onClick={(e) => handleManualCnpjLookup(e, lead)}

                        // Atualiza o lead original para VENDIDO se vier do CRM/Funil

                        const currentLeadId = formData.leadId || formData.id;

                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;

            const confirmDelete = () => { if (deleteConfirmId) { deleteItem(deleteConfirmId); setDeleteConfirmId(null); } };

        const CRMView = ({ leads, sales, updateItem, onConvertToSale, deleteSale }) => {
            const [selectedLead, setSelectedLead] = useState(null);
            const [notes, setNotes] = useState('');

            const stages = [
                { id: 'contacted', label: 'Iniciado', color: 'bg-blue-500/20 text-blue-400 border-blue-500/50' },

                { id: 'converted', label: 'Fechado', color: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/50' }
            ];

            const crmLeads = useMemo(() => {
                const activeLeads = leads.filter(l => ['contacted', 'negotiating', 'qualified'].includes(l.status));
                const closedDeals = sales.map(s => {
                    const cleanNum = (str) => str ? String(str).replace(/\D/g, '') : '';
                    const normalize = (str) => str ? String(str).toLowerCase().trim() : '';

                    // Busca o lead original priorizando o leadId salvo na venda
                    const origLead = leads.find(l => 
                        (s.leadId && String(l.id) === String(s.leadId)) ||
                        (l.status === 'converted' && (
                            (l.cnpj && s.cnpj && cleanNum(l.cnpj) === cleanNum(s.cnpj)) ||
                            (l.phone && s.phone && cleanNum(l.phone) === cleanNum(s.phone)) ||
                            (l.company && s.company && normalize(l.company) === normalize(s.company)) ||
                            (l.contact && s.company && normalize(l.contact) === normalize(s.company))
                        ))
                    );

                    return {
                        id: `sale_${s.id}`,
                        contact: s.company || origLead?.contact || 'Lojista',
                        date: s.date,
                        city: s.city || origLead?.city || '',
                        state: s.state || origLead?.state || '',
                        phone: s.phone || origLead?.phone || '',
                        crmNotes: origLead?.crmNotes ? `${origLead.crmNotes}\n\nFechado: ${s.pairs} pares (${fmtMoney(s.value)})` : `Lojista fechado em ${fmtDate(s.date)}: ${s.pairs} pares (${fmtMoney(s.value)}).\nCadastrado via Dashboard.`,
                        status: 'converted',
                        isSaleOnly: !origLead,
                        email: origLead?.email || s.email,
                        address: s.address || origLead?.address,
                        origLeadId: origLead?.id
                    };
                });
                return [...activeLeads, ...closedDeals].sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [leads, sales]);

            const moveStage = (leadId, newStatus) => {
                if (String(leadId).startsWith('sale_')) return; // Sale cards read-only move
                const lead = leads.find(l => l.id === leadId);
                if (lead) updateItem({ ...lead, status: newStatus });
            };

            const handleDragStart = (e, leadId) => {
                e.dataTransfer.setData('leadId', leadId);
                e.currentTarget.style.opacity = '0.5';
            };

            const handleDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.currentTarget.classList.add('bg-slate-800/80');
            };

            const handleDragLeave = (e) => {
                e.currentTarget.classList.remove('bg-slate-800/80');
            };

            const handleDrop = async (e, status) => {
                e.preventDefault();
                e.currentTarget.classList.remove('bg-slate-800/80');
                const leadId = e.dataTransfer.getData('leadId');
                
                if (String(leadId).startsWith('sale_')) {
                    if (status === 'converted') return;
                    const saleId = String(leadId).replace('sale_', '');
                    const saleToRemove = sales.find(s => String(s.id) === String(saleId));
                    if (saleToRemove && deleteSale) {
                        if (saleToRemove.leadId) {
                            const origLead = leads.find(l => String(l.id) === String(saleToRemove.leadId));
                            if (origLead) {
                                await updateItem({ ...origLead, status: status });
                            }
                        }
                        await deleteSale(saleId);
                    }
                    return;
                }

                if (status === 'converted') {
                    const lead = leads.find(l => String(l.id) === String(leadId));
                    if (lead) onConvertToSale(lead);
                } else {
                    moveStage(leadId, status);
                }
            };

            const openDetail = (lead) => {
                setSelectedLead(lead);
                if (lead.origLeadId) {
                    const orig = leads.find(l => String(l.id) === String(lead.origLeadId));
                    setNotes(orig?.crmNotes || '');
                } else {
                    setNotes(lead.crmNotes || '');
                }
            };

            const saveNotes = () => {
                if (selectedLead) {
                    if (String(selectedLead.id).startsWith('sale_')) {
                        if (selectedLead.isSaleOnly) {
                            alert("Esta é uma venda cadastrada manualmente. As notas são automáticas. É necessário um Lead para registrar notas.");
                            return;
                        }
                        const origLead = leads.find(l => String(l.id) === String(selectedLead.origLeadId));
                        if (origLead) updateItem({ ...origLead, crmNotes: notes });
                    } else {
                        updateItem({ ...selectedLead, crmNotes: notes });

                    setSelectedLead(null);
                }
            };

            return (
                <div className="animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">

                            </h2>

                        </div>

                            <span className="text-white font-bold">{crmLeads.length}</span>
                        </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 h-[calc(100vh-250px)]">
                        {stages.map(stage => {

                            return (
                                <div
                                    key={stage.id}
                                    className="flex flex-col bg-slate-900/50 border border-slate-700/50 rounded-xl overflow-hidden glass-panel transition-colors duration-200"
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={(e) => handleDrop(e, stage.id)}
                                >
                                    <div className={`p-4 border-b border-slate-700/50 flex justify-between items-center ${stage.color.split(' ')[0]}`}>
                                        <h3 className="font-bold flex items-center gap-2 text-xs uppercase tracking-wider">
                                            {stage.label}
                                        </h3>
                                        <span className="bg-slate-800/80 text-[10px] px-2 py-0.5 rounded-full text-slate-300 font-bold border border-slate-600">{stageLeads.length}</span>
                                    </div>

                                    <div className="flex-1 p-2 overflow-y-auto custom-scrollbar space-y-3 bg-slate-900/30">
                                        {stageLeads.length === 0 && (
                                            <div className="text-center py-10 text-slate-600 italic text-[10px]">Arraste um lead para aqui</div>
                                        )}
                                        {stageLeads.map(lead => (
                                            <div
                                                key={lead.id}
                                                draggable="true"
                                                onDragStart={(e) => handleDragStart(e, lead.id)}
                                                onDragEnd={handleDragEnd}
                                                onClick={() => openDetail(lead)}
                                                className="bg-slate-800/80 border border-slate-700/60 p-3 rounded-lg shadow-sm hover:border-amber-500/50 transition-all cursor-move active:scale-95 duration-200"
                                            >
                                                <div className="flex justify-between items-start mb-2 gap-2">
                                                    <h4 className="font-bold text-white text-[12px] leading-tight line-clamp-1">{lead.contact}</h4>
                                                    <span className="text-[9px] text-slate-500 font-mono whitespace-nowrap">{fmtDate(lead.date)}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-400 mb-2 flex items-center gap-1">
                                                    <Globe size={10} className="text-blue-500" /> {lead.city} - {lead.state}
                                                </p>

                                                {lead.crmNotes && (
                                                    <div className="bg-amber-500/5 p-1.5 rounded text-[9px] text-amber-200/60 italic mb-2 border border-amber-500/10 line-clamp-2">
                                                        {lead.crmNotes}
                                                    </div>
                                                )}

                                                <div className="flex items-center justify-between gap-1 pt-2 border-t border-slate-700/50">
                                                    <a
                                                        href={`https://wa.me/${String(lead.phone).replace(/\D/g, '')}`}
                                                        target="wa_rico"
                                                        onClick={(e) => e.stopPropagation()}
                                                        className="p-1.5 bg-emerald-600/20 text-emerald-500 hover:bg-emerald-600 hover:text-white rounded-md transition-all"
                                                    >
                                                        <Phone size={12} />
                                                    </a>

                                                    {stage.id !== 'converted' ? (
                                                        <button
                                                            onClick={(e) => { e.stopPropagation(); onConvertToSale(lead); }}
                                                            className="px-2 py-1 bg-amber-600/20 text-amber-500 hover:bg-amber-600 hover:text-white text-[9px] font-bold rounded-md transition-all flex items-center gap-1"
                                                        >
                                                            Fechar <ArrowRight size={10} />
                                                        </button>
                                                    ) : (
                                                        <span className="text-[9px] text-emerald-500 font-bold flex items-center gap-1">
                                                            <Shield size={10} /> Cliente
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Modal de Detalhes do Lead */}
                    {selectedLead && (
                        <Modal isOpen={!!selectedLead} onClose={() => setSelectedLead(null)} title="Ficha do Lead / Negociação">
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4 bg-slate-800/50 p-4 rounded-lg border border-slate-700/50">
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Nome / Contato</label>
                                        <p className="text-white font-bold">{selectedLead.contact}</p>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Data de Entrada</label>
                                        <p className="text-slate-300 font-mono">{fmtDate(selectedLead.date)}</p>
                                    </div>
                                    <div className="col-span-2">
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Empresa / Lojista</label>
                                        <p className="text-slate-300">{selectedLead.company || '-'}</p>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">WhatsApp</label>
                                        <p className="text-emerald-400 font-bold">{selectedLead.phone || '-'}</p>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">E-mail</label>
                                        <p className="text-slate-400 text-xs">{selectedLead.email || '-'}</p>
                                    </div>

                                        <p className="text-slate-300">{selectedLead.address}, {selectedLead.city} - {selectedLead.state}</p>
                                    </div>

                                    <label className="block text-[10px] uppercase text-amber-500 font-bold mb-2">Anotações da Negociação</label>

                                    ></textarea>

                                    >

                                    >

                                    </button>
                                </div>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const AnalyticsView = ({ sales, ads, leads = [], repurchases = [] }) => {
            const [filterDate, setFilterDate] = useState('all');
            const [sections, setSections] = useState({ financial: true, geo: true, ops: true });
            const availableMonths = useMemo(() => { const months = new Set([...sales.map(s => s.date.slice(0, 7)), ...ads.map(a => a.month), ...repurchases.map(r => r.date.slice(0, 7))]); return Array.from(months).sort(); }, [sales, ads, repurchases]);

            const data = useMemo(() => {
                let filteredSales = sales;
                let filteredAds = ads;
                let filteredReps = repurchases;
                if (filterDate !== 'all') { 
                    filteredSales = sales.filter(s => s.date.startsWith(filterDate)); 
                    filteredAds = ads.filter(a => a.month === filterDate); 
                    filteredReps = repurchases.filter(r => r.date.startsWith(filterDate));
                }
                
                const rev1st = filteredSales.reduce((acc, c) => acc + c.value, 0);
                const revRep = filteredReps.reduce((acc, c) => acc + Number(c.value), 0);
                const revTotal = rev1st + revRep;
                
                const adCost = filteredAds.reduce((acc, c) => acc + c.value, 0);
                const pairs1st = filteredSales.reduce((acc, c) => acc + c.pairs, 0);
                const pairsRep = filteredReps.reduce((acc, c) => acc + Number(c.pairs), 0);
                
                const ticket = filteredSales.length > 0 ? rev1st / filteredSales.length : 0;
                const roi = adCost > 0 ? revTotal / adCost : 0;
                const netResult = revTotal - adCost;
                const totalOrders = filteredSales.length + filteredReps.length;
                const uniqueRetailers = new Set(filteredSales.map(s => s.company)).size;

                const monthsList = filterDate === 'all' ? availableMonths : [filterDate];
                const monthlyChartData = monthsList.map(m => {
                    const mSales = sales.filter(s => s.date.startsWith(m));
                    const mReps = repurchases.filter(r => r.date.startsWith(m));
                    const mCost = ads.find(a => a.month === m)?.value || 0;
                    
                    const mRev1st = mSales.reduce((acc, c) => acc + c.value, 0);
                    const mRevRep = mReps.reduce((acc, c) => acc + Number(c.value), 0);
                    const mRevTotal = mRev1st + mRevRep;
                    
                    const mPairs1st = mSales.reduce((acc, c) => acc + c.pairs, 0);
                    const mPairsRep = mReps.reduce((acc, c) => acc + Number(c.pairs), 0);
                    const mPairsTotal = mPairs1st + mPairsRep;
                    
                    const mTicketTotal = (mSales.length + mReps.length) > 0 ? mRevTotal / (mSales.length + mReps.length) : 0;
                    const mTicket1st = mSales.length > 0 ? mRev1st / mSales.length : 0;
                    const mTicketRep = mReps.length > 0 ? mRevRep / mReps.length : 0;

                    const mRoi = mCost > 0 ? mRevTotal / mCost : 0;
                    const LojTotal = new Set([...mSales.map(s => s.company), ...mReps.map(r => r.company)]).size;
                    const Loj1st = new Set(mSales.map(s => s.company)).size;
                    const LojRep = new Set(mReps.map(r => r.company)).size;
                    
                    const [y, mn] = m.split('-');
                    const label = `${fullMonthNames[parseInt(mn) - 1].substring(0, 3)}/${y.substring(2)}`;
                    return { label, revTotal: mRevTotal, rev1st: mRev1st, revRep: mRevRep, pairsTotal: mPairsTotal, pairs1st: mPairs1st, pairsRep: mPairsRep, ticketTotal: mTicketTotal, ticket1st: mTicket1st, ticketRep: mTicketRep, lojTotal: LojTotal, loj1st: Loj1st, lojRep: LojRep, roi: mRoi, cost: mCost };
                });

                const stateStats = {};
                filteredSales.forEach(s => {
                    const st = normalizeUF(s.state);
                    if (!st) return;
                    if (!stateStats[st]) stateStats[st] = { rev1st: 0, revRep: 0, count1st: 0, countRep: 0, pairs1st: 0, pairsRep: 0 };
                    stateStats[st].rev1st += s.value;
                    stateStats[st].count1st++;
                    stateStats[st].pairs1st += s.pairs;
                });
                filteredReps.forEach(r => {
                    const baseSale = sales.find(s => s.company === r.company);
                    const st = baseSale ? normalizeUF(baseSale.state) : null;
                    if (!st) return;
                    if (!stateStats[st]) stateStats[st] = { rev1st: 0, revRep: 0, count1st: 0, countRep: 0, pairs1st: 0, pairsRep: 0 };
                    stateStats[st].revRep += Number(r.value);
                    stateStats[st].countRep++;
                    stateStats[st].pairsRep += Number(r.pairs);
                });

                const regionStats = {};
                Object.entries(stateStats).forEach(([st, stats]) => {
                    const reg = Object.keys(REGIONS).find(r => REGIONS[r].includes(st)) || 'Outro';
                    if (!regionStats[reg]) regionStats[reg] = { rev1st: 0, revRep: 0 };
                    regionStats[reg].rev1st += stats.rev1st;
                    regionStats[reg].revRep += stats.revRep;
                });

                const weekTrend = new Array(7).fill(0);
                const monthTrend = new Array(31).fill(0);
                const daysOfWeekShort = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
                
                filteredSales.forEach(s => {
                    const d = new Date(s.date + 'T12:00:00');
                    weekTrend[d.getUTCDay()]++;
                    monthTrend[parseInt(s.date.slice(-2)) - 1]++;
                });
                filteredReps.forEach(r => {

        const LeadEfficiencyChart = ({ sales, leads }) => {
            const efficiencyData = useMemo(() => {
                const stateLeads = {};
                const stateSales = {};
                
                leads.forEach(l => {
                    const st = normalizeUF(l.state);
                    if (st) stateLeads[st] = (stateLeads[st] || 0) + 1;
                });
                
                sales.forEach(s => {
                    const st = normalizeUF(s.state);
                    if (st) stateSales[st] = (stateSales[st] || 0) + 1;
                });
                
                const states = Array.from(new Set([...Object.keys(stateLeads), ...Object.keys(stateSales)]))
                    .map(st => {
                        const l = stateLeads[st] || 0;
                        const s = stateSales[st] || 0;
                        const eff = l > 0 ? (s / l) * 100 : 0;
                        return { st, leads: l, sales: s, efficiency: eff };
                    })
                    .sort((a,b) => b.efficiency - a.efficiency)
                    .filter(x => x.leads > 0);
                
                return states;
            }, [sales, leads]);

            const chartData = {
                labels: efficiencyData.map(d => d.st),
                datasets: [
                    { label: 'Eficiência (%)', data: efficiencyData.map(d => d.efficiency.toFixed(1)), type: 'line', borderColor: '#f59e0b', backgroundColor: '#f59e0b', borderWidth: 3, pointRadius: 4, yAxisID: 'y1', order: 1 },

        const LTVView = ({ sales, repurchases, addRepurchase, updateRepurchase, deleteRepurchase, updateRetailer }) => {
            const [isCentralModalOpen, setIsCentralModalOpen] = useState(false);
            const [centralTab, setCentralTab] = useState('repurchase');
            const [selectedClient, setSelectedClient] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: 'ltvTotal', direction: 'desc' });
            const [isRetentionOpen, setIsRetentionOpen] = useState(true);

            const clientStats = useMemo(() => {
                const stats = {};
                sales.forEach(s => {
                    const company = s.company;
                    if (!stats[company]) {
                        stats[company] = {
                            company,
                            firstDate: s.date,
                            firstValue: s.value,
                            firstPairs: s.pairs,
                            state: s.state,
                            city: s.city,
                            repurchases: [],
                            repTotal: 0,
                            repCount: 0,
                            repPairs: 0
                        };
                    } else {
                        if (new Date(s.date) < new Date(stats[company].firstDate)) {
                            stats[company].firstDate = s.date;
                            stats[company].firstValue = s.value;
                            stats[company].firstPairs = s.pairs;
                        }
                    }
                });

                repurchases.forEach(r => {
                    if (stats[r.company]) {
                        stats[r.company].repurchases.push(r);
                        stats[r.company].repTotal += Number(r.value);
                        stats[r.company].repCount += 1;
                        stats[r.company].repPairs += Number(r.pairs);
                    }
                });

                return Object.values(stats).map(c => ({
                    ...c,
                    ltvTotal: c.firstValue + c.repTotal,
                    expansion: c.firstValue > 0 ? (c.repTotal / c.firstValue) * 100 : 0
                }));
            }, [sales, repurchases]);

            const sortedClients = useMemo(() => {
                let items = [...clientStats];
                items.sort((a, b) => {
                    let aVal = a[sortConfig.key];
                    let bVal = b[sortConfig.key];
                    if (sortConfig.key === 'firstDate') { aVal = new Date(aVal); bVal = new Date(bVal); }
                    if (typeof aVal === 'string') { aVal = aVal.toLowerCase(); bVal = bVal.toLowerCase(); }
                    if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return items;
            }, [clientStats, sortConfig]);

            const globalMetrics = useMemo(() => {
                const totalRep = repurchases.reduce((acc, r) => acc + Number(r.value), 0);
                const totalBase = sales.reduce((acc, s) => acc + s.value, 0);
                const expansion = totalBase > 0 ? (totalRep / totalBase) * 100 : 0;
                let totalDays = 0;
                let count = 0;
                clientStats.forEach(c => {
                    if (c.repurchases.length > 0) {
                        c.repurchases.forEach(r => {
                            const diff = (new Date(r.date) - new Date(c.firstDate)) / (1000 * 60 * 60 * 24);
                            if (diff > 0) { totalDays += diff; count++; }
                        });
                    }
                });
                const avgCycle = count > 0 ? Math.round(totalDays / count) : 0;
                return { totalRep, expansion, totalLtv: totalBase + totalRep, avgCycle };
            }, [repurchases, sales, clientStats]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const openCentralModal = (client, tab = 'repurchase') => {
                // clientStats objects match the shape needed by CustomerCentralModal except they are enriched
                // We need to find the original retailer data if possible, or use the enriched one
                // Fortunately, clientStats has company, state, city etc.
                // The Modal needs the original ID to update the retailer.
                // We'll find the sale record to get the retailer info.
                const sale = sales.find(s => s.company === client.company);
                setSelectedClient(sale || client);
                setCentralTab(tab);
                setIsCentralModalOpen(true);
            };


            const topClientsData = {
                labels: [...clientStats].sort((a,b) => b.repTotal - a.repTotal).slice(0, 5).map(c => c.company),

            };

            const monthlyEvolution = useMemo(() => {
                const months = {};
                repurchases.forEach(r => { const m = r.date.slice(0, 7); months[m] = (months[m] || 0) + Number(r.value); });
                const sortedMonths = Object.keys(months).sort();
                return {
                    labels: sortedMonths.map(m => { const [y, mn] = m.split('-'); return `${fullMonthNames[parseInt(mn)-1].substring(0,3)}/${y.substring(2)}`; }),
