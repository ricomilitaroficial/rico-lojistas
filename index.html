        const useFirebaseData = (collectionName, initialData = [], user) => {
            const [data, setData] = useState(initialData);
            const [loading, setLoading] = useState(true);
            
            // Caminho FIXO para os dados nÁo sumirem
            // Antes era: ... 'users', user.uid, collectionName

            useEffect(() => {
                if (!window.db || !window.firebaseStore || !window.appId || !user) {
                    return;
                }
                
                const { collection, onSnapshot } = window.firebaseStore;
                // MUDANÁ‡A AQUI:
                const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', collectionName);
                
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setData(items);
                    setLoading(false);
                });
                
                return () => unsubscribe();
            }, [collectionName, user]);

            const addItem = async (item) => {
                if (!window.db || !user) { setData(prev => [...prev, { ...item, id: Date.now() }]); return; }
                const { collection, addDoc } = window.firebaseStore;
                const { id, ...dataToSave } = item;
                // MUDANÁ‡A AQUI:
                await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', collectionName), dataToSave);
            };

            const updateItem = async (item) => {
                if (!window.db || !user) { setData(prev => prev.map(i => i.id === item.id ? item : i)); return; }
                const { doc, updateDoc } = window.firebaseStore;
                const { id, ...dataToSave } = item;
                // MUDANÁ‡A AQUI:
                const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', collectionName, String(id));
                await updateDoc(docRef, dataToSave);
            };

            const deleteItem = async (id) => {
                if (!window.db || !user) { setData(prev => prev.filter(i => i.id !== id)); return; }
                const { doc, deleteDoc } = window.firebaseStore;
                // MUDANÁ‡A AQUI:
                const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', collectionName, String(id));
                await deleteDoc(docRef);
            };

            return { data, loading, addItem, updateItem, deleteItem };

        const LeadAnalyticsView = ({ sales, leads, ads }) => {
            const [filterDate, setFilterDate] = useState('all');

             const availableMonths = useMemo(() => {
                const months = new Set([
                    ...sales.map(s => s.date.slice(0, 7)),
                    ...ads.map(a => a.month),
                     ...leads.map(l => l.date.slice(0, 7))
                ]);
                return Array.from(months).sort();
            }, [sales, ads, leads]);

            const data = useMemo(() => {
                let filteredSales = sales;
                let filteredAds = ads;
                let filteredLeads = leads;
                
                if (filterDate !== 'all') {
                    filteredSales = sales.filter(s => s.date.startsWith(filterDate));
                    filteredAds = ads.filter(a => a.month === filterDate);
                    filteredLeads = leads.filter(l => l.date.startsWith(filterDate));
                }

                const totalLeads = filteredLeads.length;
                const totalSales = filteredSales.length;
                const totalAds = filteredAds.reduce((acc, a) => acc + a.value, 0);
                
                const cpl = totalLeads > 0 ? totalAds / totalLeads : 0;
                const conversionRate = totalLeads > 0 ? (totalSales / totalLeads) * 100 : 0;
                const conversionRatio = totalSales > 0 ? Math.round(totalLeads / totalSales) : 0;
                
                const monthsCount = filterDate === 'all' ? availableMonths.length : 1;
                const avgLeadsPerMonth = monthsCount > 0 ? totalLeads / monthsCount : 0;

                const monthsList = filterDate === 'all' ? availableMonths : [filterDate];
                const monthlyData = monthsList.map(m => {
                    const mLeads = leads.filter(l => l.date.startsWith(m)).length;
                    const mSales = sales.filter(s => s.date.startsWith(m)).length;
                    const mAds = ads.find(a => a.month === m)?.value || 0;
                    const mCpl = mLeads > 0 ? mAds / mLeads : 0;
                    const mRate = mLeads > 0 ? (mSales / mLeads) * 100 : 0;

                    const [y, mn] = m.split('-');
                    const label = `${fullMonthNames[parseInt(mn)-1].substring(0,3)}/${y.substring(2)}`;
                    
                    return { label, leads: mLeads, sales: mSales, cpl: mCpl, rate: mRate };
                });

                const leadsByState = {};
                const leadsByRegion = {};
                const leadsBySource = {};
                const leadsByStatus = { 'new': 0, 'contacted': 0, 'qualified': 0, 'converted': 0, 'lost': 0 };
                const leadsByDay = {};
                
                filteredLeads.forEach(l => {
                    // Geo
                    const st = normalizeUF(l.state);
                    if (st) {
                        leadsByState[st] = (leadsByState[st] || 0) + 1;
                        const reg = Object.keys(REGIONS).find(r => REGIONS[r].includes(st));
                        if (reg) {
                            leadsByRegion[reg] = (leadsByRegion[reg] || 0) + 1;
                        }
                    }
                    // Source
                    const src = l.source || 'Desconhecido';
                    leadsBySource[src] = (leadsBySource[src] || 0) + 1;
                    
                    // Status
                    if(l.status) leadsByStatus[l.status] = (leadsByStatus[l.status] || 0) + 1;

                    // Day Trend
                    leadsByDay[l.date] = (leadsByDay[l.date] || 0) + 1;
                });

                // OrdenaçÁo por Estado (Pareto)
                const sortedStates = Object.entries(leadsByState).sort((a, b) => b[1] - a[1]);
                const sortedStateLabels = sortedStates.map(s => s[0]);
                const sortedStateValues = sortedStates.map(s => s[1]);

                // OrdenaçÁo por Data (Ášltimos 30 dias se muitos)
                const sortedDays = Object.keys(leadsByDay).sort().slice(-30); // Ášltimos 30 dias registrados
                const trendData = sortedDays.map(d => leadsByDay[d]);
                const trendLabels = sortedDays.map(d => {
                    const parts = d.split('-');
                    return `${parts[2]}/${parts[1]}`;
                });

                return {
                    kpis: { totalLeads, cpl, conversionRate, conversionRatio, totalAds, totalSales, avgLeadsPerMonth },
                    monthly: monthlyData,
                    geo: { state: { labels: sortedStateLabels, values: sortedStateValues }, region: leadsByRegion },
                    bi: { source: leadsBySource, status: leadsByStatus, trend: { labels: trendLabels, values: trendData } }
                };
            }, [sales, leads, ads, filterDate, availableMonths]);

            const cLeadsMonth = {
                labels: data.monthly.map(d => d.label),
                datasets: [
                    { type: 'line', label: 'Taxa Conv. (%)', data: data.monthly.map(d => d.rate.toFixed(1)), borderColor: '#8b5cf6', backgroundColor: '#8b5cf6', yAxisID: 'y1', order: 0 },
                    { type: 'bar', label: 'Leads', data: data.monthly.map(d => d.leads), backgroundColor: '#3b82f6', borderRadius: 4, order: 1 },

            };

            const cCplMonth = {
                labels: data.monthly.map(d => d.label),
                datasets: [
                    { label: 'Custo por Lead (CPL)', data: data.monthly.map(d => d.cpl.toFixed(2)), backgroundColor: '#f59e0b', borderRadius: 4, type: 'bar' }

            const cLeadsRegion = {

                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'],
                    borderWidth: 0
                }]
            };

            const cLeadsState = {
                labels: data.geo.state.labels,
                datasets: [{
                    label: 'Leads por Estado',
                    data: data.geo.state.values,
                    backgroundColor: '#3b82f6',
                    borderRadius: 4
                }]
            };

            return (

                        </h2>
                        <div className="flex items-center gap-2 bg-slate-900 p-1 rounded-lg border border-slate-700">

                            <select 
                                className="bg-slate-800 text-white text-sm border-none rounded py-1 px-3 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer"
                                value={filterDate}
                                onChange={(e) => setFilterDate(e.target.value)}
                            >
                                <option value="all">Visão Consolidada (Todos)</option>
                                {availableMonths.map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                        <KpiCard title="Total de Leads" value={data.kpis.totalLeads} subtext="No período selecionado" icon={Filter} colorClass="border-blue-500" />
                        <KpiCard title="Custo por Lead (CPL)" value={fmtMoney(data.kpis.cpl)} subtext="Investimento / Leads" icon={DollarSign} colorClass="border-amber-500" />
                        <KpiCard title="Taxa de Conversão" value={data.kpis.conversionRate.toFixed(1) + '%'} subtext={`1 venda a cada ${data.kpis.conversionRatio} leads`} icon={Target} colorClass="border-emerald-500" />
                        <KpiCard title="Investimento Total" value={fmtMoney(data.kpis.totalAds)} subtext="Gasto em Anúncios" icon={Wallet} colorClass="border-slate-500" />
                        <KpiCard title="Média Leads/Mês" value={data.kpis.avgLeadsPerMonth.toFixed(1)} subtext="Média do período" icon={Activity} colorClass="border-cyan-500" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Linha 1: EvoluçÁo e Custo */}
                        <div className="lg:col-span-2">
                            <ChartContainer title="EvoluçÁo Mensal (Funil Macro)" subtitle="Comparativo Leads vs Vendas">
                                <ChartComponent type="bar" data={cLeadsMonth} options={{ scales: { y: {display: false}, y1: { type: 'linear', display: false, position: 'right', grid: {drawOnChartArea: false} } } }} />
                            </ChartContainer>
                        </div>
                        <ChartContainer title="Custo por Lead (CPL)" subtitle="Eficiência do investimento (R$)">
                             <ChartComponent type="bar" data={cCplMonth} labelType="money" />
                        </ChartContainer>

                        {/* Linha 3: Geo Detalhado */}

                            <div className="flex justify-center h-48">
                                <ChartComponent type="doughnut" data={cLeadsRegion} labelType="percent" />
                            </div>
                        </ChartContainer>
                        
                         <div className="lg:col-span-2">
                             <ChartContainer title="Ranking de Estados" subtitle="Leads por UF (Maior para Menor)">
                                 <ChartComponent type="bar" data={cLeadsState} />
                            </ChartContainer>
                        </div>
                    </div>
                </div>
            );
        };

        const LeadsView = ({ leads, addItem, updateItem, onConvertToSale, clearNotification, onSync, apiUrl }) => {
            const [syncing, setSyncing] = useState(false);
            const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });
            
            // Pagination state
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(50);

            useEffect(() => {
                clearNotification();
            }, []);

            const handleSyncClick = async () => {
                setSyncing(true);
                await onSync();
                setSyncing(false);
            };

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const sortedLeads = useMemo(() => {
                let items = [...leads];
                items.sort((a, b) => {
                    let aValue = a[sortConfig.key];
                    let bValue = b[sortConfig.key];
                    if (sortConfig.key === 'date') { aValue = new Date(aValue); bValue = new Date(bValue); }
                    if (typeof aValue === 'string') { aValue = aValue.toLowerCase(); bValue = bValue.toLowerCase(); }
                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return items;
            }, [leads, sortConfig]);

            // Pagination Logic
            const totalPages = Math.ceil(sortedLeads.length / itemsPerPage);
            const paginatedLeads = sortedLeads.slice(
                (currentPage - 1) * itemsPerPage,
                currentPage * itemsPerPage
            );

            const SortIcon = ({ column }) => { if (sortConfig.key !== column) return null; return sortConfig.direction === 'asc' ? <ChevronUp size={14} className="ml-1 inline" /> : <ChevronDown size={14} className="ml-1 inline" />; };

                                    <option value={100000} className="bg-slate-800">Todos</option>

                                disabled={syncing} 
                                className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded flex items-center gap-2 text-sm font-bold shadow-lg shadow-blue-900/20 disabled:opacity-50 transition-all"

                                <RefreshCw size={18} className={syncing ? "animate-spin" : ""} /> 
                                {syncing ? 'Sincronizando...' : 'Sincronizar Agora'}

                    </div>

                    <div className="glass-panel rounded-lg overflow-hidden flex flex-col mb-6">

                                        <th className="px-3 py-3 sortable w-[120px] text-center sticky top-0 bg-slate-800" onClick={() => handleSort('state')}>Local <SortIcon column="state"/></th>
                                        <th className="px-3 py-3 w-[150px] text-center sticky top-0 bg-slate-800">Lojista/CNPJ</th>
                                        <th className="px-3 py-3 w-[160px] text-center sticky top-0 bg-slate-800">E-mail</th>

                                        <th className="px-3 py-3 text-center sticky top-0 bg-slate-800">Observações</th>
                                        <th className="px-3 py-3 text-center w-[120px] sticky right-0 top-0 bg-slate-800 z-30 shadow-[-5px_0_10px_rgba(0,0,0,0.2)]">AçÁo</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700/50">
                                    {paginatedLeads.map((lead) => (

                                                    {['contacted', 'negotiating', 'qualified'].includes(lead.status) && <span className="text-[9px] bg-amber-500/20 text-amber-500 px-1.5 py-0.5 rounded uppercase font-bold tracking-tight border border-amber-500/30">EM CRM</span>}
                                                    {lead.status === 'converted' && <span className="text-[9px] bg-emerald-500/20 text-emerald-500 px-1.5 py-0.5 rounded uppercase font-bold tracking-tight border border-emerald-500/30">VENDIDO</span>}
                                                </div>
                                            </td>
                                            <td className="px-3 py-4 align-top text-center whitespace-normal">
                                                {lead.phone ? (
                                                    <a 
                                                        href={`https://wa.me/${String(lead.phone).replace(/\D/g,'')}`} 
                                                        target="_blank" 
                                                        onClick={() => {

                                                    >
                                                        <Phone size={12} /> <span className="text-[12px]">{lead.phone}</span>
                                                    </a>
                                                ) : <span className="text-slate-600">-</span>}
                                            </td>
                                            <td className="px-3 py-4 align-top whitespace-normal">
                                                <div className="text-white font-medium text-center">{lead.state || '?'}</div>

                                                {lead.status === 'converted' ? (

                                <label className="block text-sm font-bold mb-2 text-white flex items-center gap-2">Link da API (Script Google Sheets) <LinkIcon size={16}/></label>

                                <input type="url" className="input-dark p-3" placeholder="https://script.google.com/macros/s/..." value={url} onChange={e=>setUrl(e.target.value)} />
                            </div>

                            {msg && <div className="bg-emerald-500/20 text-emerald-400 p-3 rounded text-sm text-center">{msg}</div>}
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded transition-colors shadow-lg shadow-blue-900/20">Salvar Alterações</button>
                        </form>
                        
                        <div className="mt-12 pt-8 border-t border-slate-700">
                             <h3 className="text-white font-bold mb-4 flex items-center gap-2"><DatabaseIcon size={18} className="text-slate-500"/> Manutenção de Dados</h3>
                             <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <button onClick={handleClean} className="bg-amber-600/20 text-amber-500 border border-amber-500/30 hover:bg-amber-600 hover:text-white px-4 py-3 rounded text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm">
                                    <Trash2 size={16} /> Limpar Etiquetas Antigas
                                </button>
                             </div>
                             <p className="text-slate-500 text-[10px] mt-4 text-center italic">Use "Limpar Etiquetas Antigas" para marcar todos os leads de hoje ou anteriores como já visualizados.</p>
                        </div>
                    </div>
                </div>
            );
        };

        const CRMView = ({ leads, sales, updateItem, onConvertToSale }) => {
            const [selectedLead, setSelectedLead] = useState(null);
            const [notes, setNotes] = useState('');

            const stages = [
                { id: 'contacted', label: 'Iniciado', color: 'bg-blue-500/20 text-blue-400 border-blue-500/50' },
                { id: 'negotiating', label: 'Negociação', color: 'bg-amber-500/20 text-amber-400 border-amber-500/50' },
                { id: 'qualified', label: 'Proposta', color: 'bg-purple-500/20 text-purple-400 border-purple-500/50' },
                { id: 'converted', label: 'Fechado', color: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/50' }
            ];

            const crmLeads = useMemo(() => {
                const activeLeads = leads.filter(l => ['contacted', 'negotiating', 'qualified'].includes(l.status));
                const cleanNum = (str) => str ? String(str).replace(/\D/g,'') : '';
                const normalize = (str) => str ? String(str).toLowerCase().trim() : '';

                const closedDeals = sales.map(s => {
                    const origLead = leads.find(l => l.status === 'converted' && (
                        (l.cnpj && s.cnpj && cleanNum(l.cnpj) === cleanNum(s.cnpj)) ||
                        (l.phone && s.phone && cleanNum(l.phone) === cleanNum(s.phone)) ||
                        (l.company && s.company && normalize(l.company) === normalize(s.company)) ||
                        (l.contact && s.company && normalize(l.contact) === normalize(s.company))
                    ));

                    return {
                        id: `sale_${s.id}`,
                        contact: s.company || origLead?.contact || 'Lojista',
                        date: s.date,
                        city: s.city || origLead?.city || '',
                        state: s.state || origLead?.state || '',
                        phone: s.phone || origLead?.phone || '',
                        crmNotes: origLead?.crmNotes ? `${origLead.crmNotes}\n\nFechado: ${s.pairs} pares (${fmtMoney(s.value)})` : `Lojista fechado em ${fmtDate(s.date)}: ${s.pairs} pares (${fmtMoney(s.value)}).\nCadastrado direto via Lojistas.`,
                        status: 'converted',
                        isSaleOnly: !origLead,
                        email: origLead?.email || s.email,
                        address: s.address || origLead?.address,
                        origLeadId: origLead?.id
                    };
                });
                return [...activeLeads, ...closedDeals].sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [leads, sales]);

            const moveStage = (leadId, newStatus) => {
                if (String(leadId).startsWith('sale_')) return; // Sale cards read-only move
                const lead = leads.find(l => l.id === leadId);
                if (lead) updateItem({ ...lead, status: newStatus });
            };

            const handleDragStart = (e, leadId) => {
                e.dataTransfer.setData('leadId', leadId);
                e.currentTarget.style.opacity = '0.5';
            };

            const handleDragEnd = (e) => {
                e.currentTarget.style.opacity = '1';
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.currentTarget.classList.add('bg-slate-800/80');
            };

            const handleDragLeave = (e) => {
                e.currentTarget.classList.remove('bg-slate-800/80');
            };

            const handleDrop = (e, status) => {
                e.preventDefault();
                e.currentTarget.classList.remove('bg-slate-800/80');
                const leadId = e.dataTransfer.getData('leadId');
                if (String(leadId).startsWith('sale_')) return;
                
                if (status === 'converted') {
                    const lead = leads.find(l => String(l.id) === String(leadId));
                    if (lead) onConvertToSale(lead);
                } else {
                    moveStage(leadId, status);
                }
            };

            const openDetail = (lead) => {
                setSelectedLead(lead);
                if (lead.origLeadId) {
                    const orig = leads.find(l => String(l.id) === String(lead.origLeadId));
                    setNotes(orig?.crmNotes || '');
                } else {
                    setNotes(lead.crmNotes || '');
                }
            };

            const saveNotes = () => {
                if (selectedLead) {
                    if (String(selectedLead.id).startsWith('sale_')) {
                        if (selectedLead.isSaleOnly) {
                            alert("Esta é uma venda cadastrada manualmente. As notas são automáticas. É necessário um Lead para registrar notas.");
                            return;
                        }
                        const origLead = leads.find(l => String(l.id) === String(selectedLead.origLeadId));
                        if (origLead) updateItem({ ...origLead, crmNotes: notes });
                    } else {
                        updateItem({ ...selectedLead, crmNotes: notes });
                    }
                    setSelectedLead(null);
                }
            };

            return (
                <div className="animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-2xl font-bold text-white uppercase flex items-center gap-2">
                                <Target className="text-amber-500" /> CRM de Negociações
                            </h2>
                            <p className="text-slate-400 text-sm mt-1">Arraste os leads para mudar o status ou clique para ver detalhes</p>
                        </div>
                        <div className="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 flex items-center gap-2">
                            <span className="text-slate-400 text-xs font-bold uppercase">Total em Funil:</span>
                            <span className="text-white font-bold">{crmLeads.length}</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 h-[calc(100vh-250px)]">
                        {stages.map(stage => {
                            const stageLeads = crmLeads.filter(l => l.status === stage.id);
                            return (
                                <div 
                                    key={stage.id} 
                                    className="flex flex-col bg-slate-900/50 border border-slate-700/50 rounded-xl overflow-hidden glass-panel transition-colors duration-200"
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={(e) => handleDrop(e, stage.id)}
                                >
                                    <div className={`p-4 border-b border-slate-700/50 flex justify-between items-center ${stage.color.split(' ')[0]}`}>
                                        <h3 className="font-bold flex items-center gap-2 text-xs uppercase tracking-wider">
                                            {stage.label}
                                        </h3>
                                        <span className="bg-slate-800/80 text-[10px] px-2 py-0.5 rounded-full text-slate-300 font-bold border border-slate-600">{stageLeads.length}</span>
                                    </div>
                                    
                                    <div className="flex-1 p-2 overflow-y-auto custom-scrollbar space-y-3 bg-slate-900/30">
                                        {stageLeads.length === 0 && (
                                            <div className="text-center py-10 text-slate-600 italic text-[10px]">Arraste um lead para aqui</div>
                                        )}
                                        {stageLeads.map(lead => (
                                            <div 
                                                key={lead.id} 
                                                draggable="true"
                                                onDragStart={(e) => handleDragStart(e, lead.id)}
                                                onDragEnd={handleDragEnd}
                                                onClick={() => openDetail(lead)}
                                                className="bg-slate-800/80 border border-slate-700/60 p-3 rounded-lg shadow-sm hover:border-amber-500/50 transition-all cursor-move active:scale-95 duration-200"
                                            >
                                                <div className="flex justify-between items-start mb-2 gap-2">
                                                    <h4 className="font-bold text-white text-[12px] leading-tight line-clamp-1">{lead.contact}</h4>
                                                    <span className="text-[9px] text-slate-500 font-mono whitespace-nowrap">{fmtDate(lead.date)}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-400 mb-2 flex items-center gap-1">
                                                    <Globe size={10} className="text-blue-500" /> {lead.city} - {lead.state}
                                                </p>
                                                
                                                {lead.crmNotes && (
                                                    <div className="bg-amber-500/5 p-1.5 rounded text-[9px] text-amber-200/60 italic mb-2 border border-amber-500/10 line-clamp-2">
                                                        {lead.crmNotes}
                                                    </div>
                                                )}

                                                <div className="flex items-center justify-between gap-1 pt-2 border-t border-slate-700/50">
                                                    <a 
                                                        href={`https://wa.me/${String(lead.phone).replace(/\D/g,'')}`} 
                                                        target="_blank" 
                                                        onClick={(e) => e.stopPropagation()}
                                                        className="p-1.5 bg-emerald-600/20 text-emerald-500 hover:bg-emerald-600 hover:text-white rounded-md transition-all"
                                                    >
                                                        <Phone size={12} />
                                                    </a>
                                                    
                                                    {stage.id !== 'converted' ? (
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); onConvertToSale(lead); }}
                                                            className="px-2 py-1 bg-amber-600/20 text-amber-500 hover:bg-amber-600 hover:text-white text-[9px] font-bold rounded-md transition-all flex items-center gap-1"
                                                        >
                                                            Fechar <ArrowRight size={10} />
                                                        </button>
                                                    ) : (
                                                        <span className="text-[9px] text-emerald-500 font-bold flex items-center gap-1">
                                                            <Shield size={10} /> Cliente
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Modal de Detalhes do Lead */}
                    {selectedLead && (
                        <Modal isOpen={!!selectedLead} onClose={() => setSelectedLead(null)} title="Ficha do Lead / Negociação">
                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-4 bg-slate-800/50 p-4 rounded-lg border border-slate-700/50">
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Nome / Contato</label>
                                        <p className="text-white font-bold">{selectedLead.contact}</p>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Data de Entrada</label>
                                        <p className="text-slate-300 font-mono">{fmtDate(selectedLead.date)}</p>
                                    </div>
                                    <div className="col-span-2">
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">Empresa / Lojista</label>
                                        <p className="text-slate-300">{selectedLead.company || '-'}</p>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">WhatsApp</label>
                                        <p className="text-emerald-400 font-bold">{selectedLead.phone || '-'}</p>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase text-slate-500 font-bold mb-1">E-mail</label>
                                        <p className="text-slate-400 text-xs">{selectedLead.email || '-'}</p>
                                    </div>
                                    <div className="col-span-2">
                                        <p className="text-slate-300">{selectedLead.address}, {selectedLead.city} - {selectedLead.state}</p>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-[10px] uppercase text-amber-500 font-bold mb-2">Anotações da Negociação</label>
                                    <textarea 
                                        className="input-dark w-full h-40 text-sm p-3 focus:ring-1 focus:ring-amber-500"
                                        placeholder="Escreva aqui o histórico da negociação, condições especiais, próximos passos..."
                                        value={notes}
                                        onChange={(e) => setNotes(e.target.value)}
                                    ></textarea>
                                </div>

                                <div className="flex gap-3 pt-4 border-t border-slate-700">
                                    <button 
                                        onClick={() => setSelectedLead(null)}
                                        className="flex-1 px-4 py-3 rounded-lg border border-slate-700 text-slate-400 hover:bg-slate-800 font-bold text-sm transition-all"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        onClick={saveNotes}
                                        className="flex-1 px-4 py-3 rounded-lg bg-amber-600 hover:bg-amber-500 text-white font-bold text-sm transition-all shadow-lg shadow-amber-900/20"
                                    >
                                        Salvar Anotações
                                    </button>
                                </div>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const AnalyticsView = ({ sales, ads }) => {
            const [filterDate, setFilterDate] = useState('all'); 
            const [sections, setSections] = useState({ financial: true, geo: true, ops: true });
            const availableMonths = useMemo(() => { const months = new Set([ ...sales.map(s => s.date.slice(0, 7)), ...ads.map(a => a.month) ]); return Array.from(months).sort(); }, [sales, ads]);

            const data = useMemo(() => {
                let filteredSales = sales;
                let filteredAds = ads;
                if (filterDate !== 'all') { filteredSales = sales.filter(s => s.date.startsWith(filterDate)); filteredAds = ads.filter(a => a.month === filterDate); }
                const rev = filteredSales.reduce((acc, c) => acc + c.value, 0);
                const adCost = filteredAds.reduce((acc, c) => acc + c.value, 0);
                const pairs = filteredSales.reduce((acc, c) => acc + c.pairs, 0);
                const ticket = filteredSales.length > 0 ? rev / filteredSales.length : 0;
                const roi = adCost > 0 ? rev / adCost : 0;
                const netResult = rev - adCost;
                const totalDeals = filteredSales.length;
                const avgPairsPerDeal = totalDeals > 0 ? pairs / totalDeals : 0;
                const uniqueRetailers = new Set(filteredSales.map(s => s.company)).size;

                const monthsList = filterDate === 'all' ? availableMonths : [filterDate];
                const monthlyChartData = monthsList.map(m => {
                    const mSales = sales.filter(s => s.date.startsWith(m));
                    const mCost = ads.find(a => a.month === m)?.value || 0;
                    const mRev = mSales.reduce((acc,c) => acc + c.value, 0);
                    const mPairs = mSales.reduce((acc,c) => acc + c.pairs, 0);
                    const mTicket = mSales.length > 0 ? mRev / mSales.length : 0;
                    const mRoi = mCost > 0 ? mRev / mCost : 0;
                    let newRetailers = new Set(mSales.map(s => s.company)).size;
                    const [y, mn] = m.split('-');
                    const label = `${fullMonthNames[parseInt(mn)-1].substring(0,3)}/${y.substring(2)}`;
                    return { rawMonth: m, label, revenue: mRev, cost: mCost, roi: mRoi, pairs: mPairs, ticket: mTicket, newRetailers };
                });

                const stateStats = {};
                const regionStats = {};
                filteredSales.forEach(s => {
                    const st = normalizeUF(s.state);
                    if (!st) return; // Ignora "gata" e outros lixos
                    if(!stateStats[st]) stateStats[st] = { rev:0, count:0, receita: 0, pedidos: 0 };
                    stateStats[st].rev += s.value;
                    stateStats[st].count++;
                    stateStats[st].receita += s.value;
                    stateStats[st].pedidos++;
                    const reg = Object.keys(REGIONS).find(r => REGIONS[r].includes(st)) || 'Outro';
                    if(!regionStats[reg]) regionStats[reg] = 0;
                    regionStats[reg] += s.value;
                });

                const ops = { week: ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d => ({name:d, count:0, rev:0})), monthDay: Array.from({length:31}, (_,i)=>({day:i+1, count:0})), buckets: {'1-12':0, '13-24':0, '25-48':0, '49+':0} };
                filteredSales.forEach(s => { const d = new Date(s.date); ops.week[d.getDay()].count++; ops.week[d.getDay()].rev += s.value; ops.monthDay[d.getDate()-1].count++; if(s.pairs<=12) ops.buckets['1-12']++; else if(s.pairs<=24) ops.buckets['13-24']++; else if(s.pairs<=48) ops.buckets['25-48']++; else ops.buckets['49+']++; });

                return { kpis: { rev, roi, pairs, ticket, netResult, adCost, avgPairsPerDeal, uniqueRetailers }, monthly: monthlyChartData, geo: { state: stateStats, region: regionStats }, ops };
            }, [sales, ads, filterDate, availableMonths]);

            const cRev = { labels: data.monthly.map(d=>d.label), datasets: [{ label: 'Faturamento', data: data.monthly.map(d=>d.revenue), backgroundColor: '#f59e0b', borderRadius:4 }] };
            const cRoi = { labels: data.monthly.map(d=>d.label), datasets: [{ label: 'ROI (x)', data: data.monthly.map(d=>d.roi.toFixed(1)), backgroundColor: '#8b5cf6', borderRadius:4 }] };
            const cPairs = { labels: data.monthly.map(d=>d.label), datasets: [{ label: 'Pares', data: data.monthly.map(d=>d.pairs), backgroundColor: '#3b82f6', borderRadius:4 }] };
            const cRevVsAds = { labels: data.monthly.map(d=>d.label), datasets: [{ label: 'Retorno', data: data.monthly.map(d=>d.revenue), backgroundColor: '#10b981', borderRadius:3 }, { label: 'Ads', data: data.monthly.map(d=>d.cost), backgroundColor: '#64748b', borderRadius:3 }] };
            const cTicketM = { labels: data.monthly.map(d=>d.label), datasets: [{ label: 'Ticket Médio', data: data.monthly.map(d=>d.ticket), backgroundColor: '#6366f1', borderRadius:4 }] };
            const cNew = { labels: data.monthly.map(d=>d.label), datasets: [{ label: 'Novos Lojistas', data: data.monthly.map(d=>d.newRetailers), backgroundColor: '#ec4899', borderRadius:4 }] };
            const sortedStates = Object.entries(data.geo.state).sort((a,b)=>b[1].rev - a[1].rev);
            
            // Novos ordenadores para os gráficos específicos
            const sortedStatesByCount = Object.entries(data.geo.state).sort((a,b)=>b[1].count - a[1].count);
            const sortedStatesByTicket = Object.entries(data.geo.state).sort((a,b)=>(b[1].rev/b[1].count) - (a[1].rev/a[1].count));

            const cGeoRev = { labels: sortedStates.map(s=>s[0]), datasets:[{label:'Receita', data: sortedStates.map(s=>s[1].rev), backgroundColor:'#f59e0b', borderRadius:4, indexAxis:'y'}] };
            
            // Usando os ordenadores específicos
            const cGeoCount = { labels: sortedStatesByCount.map(s=>s[0]), datasets:[{label:'Pedidos', data: sortedStatesByCount.map(s=>s[1].count), backgroundColor:'#3b82f6', borderRadius:4}] };
            const cGeoTicket = { labels: sortedStatesByTicket.map(s=>s[0]), datasets:[{label:'Ticket Médio', data: sortedStatesByTicket.map(s=>s[1].rev/s[1].count), backgroundColor:'#8b5cf6', borderRadius:4}] };
            
            // OrdenaçÁo da RegiÁo (Maior para menor)
            const sortedRegions = Object.entries(data.geo.region).sort((a, b) => b[1] - a[1]);
            const cReg = { 
                labels: sortedRegions.map(r => r[0]), 
                datasets:[{ data: sortedRegions.map(r => r[1]), backgroundColor: ['#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#8b5cf6'], borderWidth:0 }] 
            };
            
            const cBuckets = { labels:Object.keys(data.ops.buckets), datasets:[{data:Object.values(data.ops.buckets), backgroundColor: ['#64748b', '#3b82f6', '#8b5cf6', '#f59e0b'], borderWidth:0}] };
            const cWeekCount = { labels: data.ops.week.map(w=>w.name), datasets:[{label:'Pedidos', data: data.ops.week.map(w=>w.count), backgroundColor:'#06b6d4', borderRadius:4}] };
            const cWeekRev = { labels: data.ops.week.map(w=>w.name), datasets:[{label:'Receita', data: data.ops.week.map(w=>w.rev), backgroundColor:'#10b981', borderRadius:4}] };
            const cMonthDay = { labels: data.ops.monthDay.map(d=>d.day), datasets:[{label:'Pedidos', data: data.ops.monthDay.map(d=>d.count), backgroundColor:'#ec4899', borderRadius:4}] };
            const toggle = (k) => setSections(p => ({...p, [k]: !p[k]}));

            return (
                <div className="animate-fadeIn">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <h2 className="text-2xl font-bold text-white uppercase flex items-center gap-2"><TrendingUp className="text-amber-500" /> Dashboard Analítico</h2>
                        <div className="flex items-center gap-2 bg-slate-900 p-1 rounded-lg border border-slate-700">
                            <span className="text-slate-400 text-xs font-bold uppercase px-3">Período:</span>
                            <select className="bg-slate-800 text-white text-sm border-none rounded py-1 px-3 focus:ring-1 focus:ring-amber-500 outline-none cursor-pointer" value={filterDate} onChange={(e) => setFilterDate(e.target.value)}>
                                <option value="all">Visão Consolidada (Todos)</option>
                                {availableMonths.map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <KpiCard title="Faturamento Total" value={fmtMoney(data.kpis.rev)} subtext={filterDate === 'all' ? 'Total Acumulado' : 'Neste Mês'} icon={DollarSign} colorClass="border-amber-500" />
                        <KpiCard title="Retorno Líquido" value={fmtMoney(data.kpis.netResult)} subtext="Lucro Operacional" icon={TrendingUp} colorClass="border-emerald-600" />
                        <KpiCard title="Lojistas Fechados" value={data.kpis.uniqueRetailers} subtext="Clientes Únicos" icon={Users} colorClass="border-purple-500" />
                        <KpiCard title="Volume Vendas" value={data.kpis.pairs} subtext="Pares Vendidos" icon={Target} colorClass="border-blue-500" />
                        <KpiCard title="ROI Marketing" value={`${data.kpis.roi.toFixed(2)}x`} subtext="Retorno sobre Ads" icon={Activity} colorClass="border-indigo-500" />
                        <KpiCard title="Valor Investimento" value={fmtMoney(data.kpis.adCost)} subtext="Custo Ads" icon={DollarSign} colorClass="border-slate-500" />
                    </div>
                    <SectionHeader title="Financeiro" icon={BarChart3} color="bg-amber-500" isOpen={sections.financial} onToggle={() => toggle('financial')} />
                    {sections.financial && (
                        <div className="space-y-6">
                            <ChartContainer title="Receita Mês a Mês"><ChartComponent type="bar" data={cRev} labelType="money"/></ChartContainer>
                            <ChartContainer title="Retorno vs Investimento"><ChartComponent type="bar" data={cRevVsAds} labelType="money"/></ChartContainer>
                            <ChartContainer title="ROI por Mês"><ChartComponent type="bar" data={cRoi} labelType="roi"/></ChartContainer>
                            <ChartContainer title="Ticket Médio por Mês"><ChartComponent type="bar" data={cTicketM} labelType="money"/></ChartContainer>
                            <ChartContainer title="Receita por Dia da Semana"><ChartComponent type="bar" data={cWeekRev} labelType="money"/></ChartContainer>
                        </div>
                    )}
                    <SectionHeader title="Geográfico" icon={Globe} color="bg-blue-500" isOpen={sections.geo} onToggle={() => toggle('geo')} />
                    {sections.geo && (
                        <div className="space-y-6">
                            <ChartContainer title="Receita por Estado"><ChartComponent type="bar" data={cGeoRev} options={{indexAxis:'y', scales: {x: {display: false}, y: {display: true, grid: {display: false}, ticks: {color: '#e2e8f0', font: {size: 12, weight: 'bold'}}}}}} height={400} labelType="money"/></ChartContainer>
                            <div className="flex justify-center mb-6"><div className="w-full max-w-md"><ChartContainer title="Receita por RegiÁo"><ChartComponent type="doughnut" data={cReg} labelType="money"/></ChartContainer></div></div>
                            <ChartContainer title="Pedidos por Estado"><ChartComponent type="bar" data={cGeoCount}/></ChartContainer>
                            <ChartContainer title="Ticket Médio por Estado"><ChartComponent type="bar" data={cGeoTicket} labelType="money"/></ChartContainer>
                        </div>
                    )}
                    <SectionHeader title="Operacional" icon={Layers} color="bg-emerald-500" isOpen={sections.ops} onToggle={() => toggle('ops')} />
                    {sections.ops && (
                        <div className="space-y-6">
                            <ChartContainer title="Novos Lojistas por Mês"><ChartComponent type="bar" data={cNew}/></ChartContainer>
                            <ChartContainer title="Pares Vendidos por Mês"><ChartComponent type="bar" data={cPairs}/></ChartContainer>
                            <div className="flex justify-center mb-6"><div className="w-full max-w-md"><ChartContainer title="DistribuiçÁo de Pares por Pedido"><ChartComponent type="pie" data={cBuckets}/></ChartContainer></div></div>
                            <ChartContainer title="Pedidos por Dia da Semana"><ChartComponent type="bar" data={cWeekCount}/></ChartContainer>
                            <ChartContainer title="Pedidos por Dia do Mês"><ChartComponent type="bar" data={cMonthDay}/></ChartContainer>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('analytics');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(true);
            const [firebaseUser, setFirebaseUser] = useState(null);

            // Auth Effect for Firebase - ConexÁo
            useEffect(() => {
                if (window.firebaseAuth && window.auth) {
                    const { signInAnonymously, onAuthStateChanged } = window.firebaseAuth;
                    const unsubscribe = onAuthStateChanged(window.auth, (user) => {
                        if (user) {
                            setFirebaseUser(user);
                        } else {
                            signInAnonymously(window.auth).catch(console.error);
                        }
                    });
                    return () => unsubscribe();
                }
            }, []);

            // Hooks conectados ao Firebase (Substituem o useState local)
            const { data: sales, loading: loadingSales, addItem: addSale, updateItem: updateSale, deleteItem: deleteSale } = useFirebaseData('sales', [], firebaseUser);
            const { data: ads, loading: loadingAds, addItem: addAd, updateItem: updateAd, deleteItem: deleteAd } = useFirebaseData('ads', [], firebaseUser);
            const { data: leads, loading: loadingLeads, addItem: addLead, updateItem: updateLead } = useFirebaseData('leads', [], firebaseUser);
            
            // SincronizaçÁo automática de Leads com Lojistas (Vendas) e Migração
            useEffect(() => {
                if (loadingLeads || loadingSales || !leads.length || !window.db) return;
                
                // MIGRATION_KEY garante que a limpeza pesada dos "contacted" bugados aconteça só UMA VEZ
                const MIGRATION_KEY = 'crm_migration_v8';
                const hasMigrated = localStorage.getItem(MIGRATION_KEY);
                
                if (hasAutoSynced && hasMigrated) return;
                
                const { writeBatch, doc } = window.firebaseStore;
                const batch = writeBatch(window.db);
                let count = 0;

                const normalize = (str) => str ? String(str).toLowerCase().trim() : '';
                const cleanNum = (str) => str ? String(str).replace(/\D/g,'') : '';

                leads.forEach(lead => {
                    const hasSale = sales.some(s => {
                        const matchCnpj = cleanNum(s.cnpj) && cleanNum(lead.cnpj) && cleanNum(s.cnpj) === cleanNum(lead.cnpj);
                        const matchPhone = cleanNum(s.phone) && cleanNum(lead.phone) && cleanNum(s.phone) === cleanNum(lead.phone);
                        
                        const sComp = normalize(s.company);
                        const lComp = normalize(lead.company);
                        const lCont = normalize(lead.contact);

                        const matchComp = sComp && lComp && sComp === lComp && sComp.length > 2;
                        const matchCont = sComp && lCont && sComp === lCont && sComp.length > 2;

                        return matchCnpj || matchPhone || matchComp || matchCont;
                    });
                    
                    // 1. Forçar para VENDIDO se bateu com alguma venda na Lojistas
                    if (hasSale && lead.status !== 'converted') {
                        const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'leads', String(lead.id));
                        batch.update(docRef, { status: 'converted', isNew: false });
                        count++;
                    } 
                    // 2. MIGRAÁ‡ÁƒO: Limpar leads antigos "contacted" que estÁo inundando o quadro CRM
                    else if (!hasMigrated && !hasSale && ['contacted', 'negotiating', 'qualified'].includes(lead.status)) {
                        const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'leads', String(lead.id));
                        batch.update(docRef, { status: 'read', isNew: false });
                        count++;
                    }
                });

                if (count > 0) {
                    console.log(`Migração Batch: resolvendo ${count} leads pendentes...`);
                    batch.commit()
                        .then(() => {
                            localStorage.setItem(MIGRATION_KEY, 'true');
                            setHasAutoSynced(true);
                            if (!hasMigrated) window.location.reload(); 
                        })
                        .catch(err => {
                            console.error("Erro na migraçÁo batch:", err);
                            localStorage.setItem(MIGRATION_KEY, 'true');
                            setHasAutoSynced(true);
                        });
                } else {
                    localStorage.setItem(MIGRATION_KEY, 'true');
                    setHasAutoSynced(true);
                }
            }, [sales, leads.length, hasAutoSynced, loadingLeads, loadingSales]); 

            const [prefillData, setPrefillData] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [credentials, setCredentials] = useState({ username: 'ricomilitar', password: 'admin' });
            const [loginError, setLoginError] = useState('');
            const [newLeadAlert, setNewLeadAlert] = useState(false);
            const [leadsApiUrl, setLeadsApiUrl] = useState('https://script.google.com/macros/s/AKfycbx-Vr1TbLdJoXM7Y1pusPzQau7eJFhfqVDsjhCEissJ3-JFJPJ1mSweoKrpiRMp0geznQ/exec');
            const [hasAutoSynced, setHasAutoSynced] = useState(false);

            // FunçÁo para Restaurar os Dados Originais no Firebase (se estiver vazio)
            const importInitialData = async () => {
                if (window.db && firebaseUser) {
                   const batchPromises = [];
                   // Loop simples para inserir os dados iniciais um por um
                   for (const s of INITIAL_SALES) { batchPromises.push(addSale(s)); }
                   for (const a of INITIAL_ADS) { batchPromises.push(addAd(a)); }
                   
                   await Promise.all(batchPromises);
                   // Leads vazios inicialmente, mas se tiver na lista, adicionaria aqui
                   // alert("Dados restaurados com sucesso! Os gráficos devem aparecer agora."); // Comentado para ser silencioso
                }
            };

            // AUTO-SEED: Verifica se o banco está vazio e popula automaticamente
            useEffect(() => {
                // Só executa se o usuário estiver logado e o carregamento tiver terminado
                if (firebaseUser && !loadingSales && !loadingAds) {
                    // Se nÁo houver vendas nem anúncios, assume banco vazio e carrega os dados iniciais
                    if (sales.length === 0 && ads.length === 0) {
                        console.log("Banco vazio detectado. Carregando dados iniciais automaticamente...");
                        importInitialData();
                    }
                }
            }, [firebaseUser, loadingSales, loadingAds, sales.length, ads.length]);

            const syncFromApi = async () => {
                if (!leadsApiUrl) {
                    // Modo simulaçÁo se nÁo houver URL
                    const incomingLead = { id: Date.now(), date: new Date().toISOString().split('T')[0], name: 'Novo Cliente Simulado', contact: 'Lead Demo', city: 'Belo Horizonte', state: 'MG', source: 'Simulação Demo', status: 'new', isNew: true };
                    await addLead(incomingLead);
                    setNewLeadAlert(true);
                    return;
                }
                try {
                    const response = await fetch(leadsApiUrl);
                    const data = await response.json();
                    
                    const newLeads = data.map((item, index) => {
                        const getVal = (key) => {
                            if (item[key] !== undefined) return item[key];
                            const foundKey = Object.keys(item).find(k => k.trim().toLowerCase().includes(key.toLowerCase()));
                            return foundKey ? item[foundKey] : '';
                        };
                        const dateRaw = getVal('Carimbo') || getVal('Data') || new Date();
                        const dateObj = dateRaw ? new Date(dateRaw) : new Date();
                        const today = new Date().toISOString().split('T')[0];
                        const leadDate = dateObj.toISOString().split('T')[0];
                        
                        // Considerar NOVO apenas se for de HOJE em diante
                        const isHistoricallyOld = leadDate < today;

                        return {
                            date: leadDate,
                            company: getVal('Razão Social'), 
                            contact: getVal('Nome'), 
                            phone: getVal('whatsapp'), 
                            email: getVal('mail'), 
                            city: getVal('Cidade'), 
                            state: normalizeUF(getVal('Estado')), 
                            cnpj: getVal('CNPJ'), 
                            ie: getVal('Inscrição'), 
                            address: getVal('Endereço'), 
                            instagram: getVal('Instagram'), 
                            obs: getVal('Observações'), 
                            source: 'Google Forms', 
                            status: isHistoricallyOld ? 'read' : 'new', 
                            isNew: !isHistoricallyOld
                        };
                    });
                    
                    // Verifica duplicatas simples pelo nome+data antes de adicionar
                    // (Em produçÁo idealmente verificaria ID no banco, mas aqui simplificamos para o demo)
                    let count = 0;
                    const existingSignatures = new Set(leads.map(l => (l.contact || l.name) + l.date));
                    
                    const leadsToAdd = [];
                    for (const l of newLeads) {
                        const sig = (l.contact || l.name) + l.date;
                        if (!existingSignatures.has(sig)) {
                            leadsToAdd.push(addLead(l));
                            count++;
                        }
                    }
                    
                    if (leadsToAdd.length > 0) {
                        await Promise.all(leadsToAdd);
                        setNewLeadAlert(true);
                    }
                    
                } catch (error) {
                    console.error("Erro ao buscar leads:", error);
                    // NÁo alertar erro silenciosamente no auto-sync
                }
            };

            // AUTO-SYNC LEADS: Sincroniza automaticamente quando o usuário loga e os leads carregam
            useEffect(() => {
                if (firebaseUser && !loadingLeads && !hasAutoSynced && leadsApiUrl) {
                    syncFromApi();
                    setHasAutoSynced(true);
                }
            }, [firebaseUser, loadingLeads, hasAutoSynced, leadsApiUrl]);

            // AUTO-CHECK: Checa novos leads a cada 5 minutos
            useEffect(() => {
                if (!isAuthenticated || !leadsApiUrl) return;

                const interval = setInterval(() => {
                    console.log("VerificaçÁo automática de leads (5min)...");
                    syncFromApi();
                }, 5 * 60 * 1000);

                return () => clearInterval(interval);
            }, [isAuthenticated, leadsApiUrl, leads]); // Dependência 'leads' recria o intervalo quando leads mudam, garantindo closure atualizado

            const handleLogin = (u, p) => { if (u === credentials.username && p === credentials.password) { setIsAuthenticated(true); setLoginError(''); } else { setLoginError('Credenciais inválidas. Tente novamente.'); } };
            const handleLogout = () => { setIsAuthenticated(false); setView('analytics'); };
            const handleUpdateCredentials = (u, p) => { setCredentials({ username: u, password: p }); };
            const handleAcknowledgeLead = () => { setNewLeadAlert(false); setView('leads'); };
            const handleConvertToSale = (lead) => {
                updateLead({ ...lead, status: 'converted' });
                setPrefillData(lead);
                setView('retailers');
            };

            const newLeadsCount = leads.filter(l => l.status === 'new').length;

            if (!isAuthenticated) return <LoginView onLogin={handleLogin} loginError={loginError} />;
            return (
                <div className="flex bg-[#0f172a] min-h-screen text-slate-200">
                    <Sidebar 
                        view={view} 
                        setView={setView} 
                        onLogout={handleLogout} 
                        notificationCount={newLeadsCount} 
                        isCollapsed={isSidebarCollapsed}
                        toggleSidebar={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                    />
                    <main className={`flex-1 p-8 overflow-y-auto h-screen relative transition-all duration-300 ${isSidebarCollapsed ? 'ml-20' : 'ml-64'}`}>
                        {/* BotÁo de Emergência para Restaurar Dados se estiver vazio */}
                        {sales.length === 0 && ads.length === 0 && leads.length === 0 && (
                            <div className="mb-6 p-4 bg-amber-500/10 border border-amber-500/50 rounded-lg flex items-center justify-between animate-fadeIn">
                                <div className="text-amber-500 flex items-center gap-2"><DatabaseIcon size={20}/> <span>Banco de dados vazio? O carregamento automático deve iniciar em breve...</span></div>
                                <button onClick={importInitialData} className="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded font-bold text-sm shadow-lg transition-transform hover:scale-105">Forçar RestauraçÁo</button>
                            </div>
                        )}

                        {view === 'analytics' && <AnalyticsView sales={sales} ads={ads} />}
                        {view === 'lead-analytics' && <LeadAnalyticsView sales={sales} leads={leads} ads={ads} />}
                        {view === 'leads' && <LeadsView leads={leads} addItem={addLead} updateItem={updateLead} onConvertToSale={handleConvertToSale} clearNotification={() => setNewLeadAlert(false)} onSync={syncFromApi} apiUrl={leadsApiUrl} />}
                        {view === 'crm' && <CRMView leads={leads} sales={sales} updateItem={updateLead} onConvertToSale={handleConvertToSale} />}
                        {view === 'retailers' && <RetailersView sales={sales} addItem={addSale} updateItem={updateSale} deleteItem={deleteSale} prefillData={prefillData} setPrefillData={setPrefillData} updateLead={updateLead} leads={leads} />}
                        {view === 'ads' && <AdsView ads={ads} addItem={addAd} updateItem={updateAd} deleteItem={deleteAd} />}
                        {view === 'settings' && <SettingsView credentials={credentials} onUpdateCredentials={handleUpdateCredentials} apiUrl={leadsApiUrl} onUpdateApiUrl={setLeadsApiUrl} importData={importInitialData} onCleanTags={() => {
                            if (!window.db || !leads.length) return;
                            const { writeBatch, doc } = window.firebaseStore;
                            const batch = writeBatch(window.db);
                            let count = 0;

                            leads.forEach(l => {
                                // Limpar TUDO que nÁo for negociaçÁo ativa ou venda confirmada
                                if (['new', 'read', 'contacted'].includes(l.status) || l.isNew) {
                                    const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'leads', String(l.id));
                                    batch.update(docRef, { isNew: false, status: 'read' });
                                    count++;
                                }
                            });

                            if (count > 0) {
                                batch.commit()
                                    .then(() => alert(`Limpeza concluída! ${count} leads movidos para LIDO.`))
                                    .catch(err => alert("Erro na limpeza: " + err.message));
                            } else {
                                alert('Nenhum lead pendente para limpeza.');
                            }
                        }} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
