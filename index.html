                const states = {};
                repurchases.forEach(r => {
                    const sale = sales.find(s => s.company === r.company);
                    const st = sale ? normalizeUF(sale.state) : null;
                    if (st) states[st] = (states[st] || 0) + Number(r.value);
                });
                const sorted = Object.entries(states).sort((a,b) => b[1] - a[1]);
                return { labels: sorted.map(s => s[0]), datasets: [{ label: 'Receita', data: sorted.map(s => s[1]), backgroundColor: '#f59e0b', borderRadius: 4 }] };
            }, [repurchases, sales]);

            const SortIcon = ({ column }) => sortConfig.key === column ? (sortConfig.direction === 'asc' ? <ChevronUp size={14} className="ml-1 inline" /> : <ChevronDown size={14} className="ml-1 inline" />) : null;

            return (
                <div className="animate-fadeIn">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-2xl font-bold text-white uppercase flex items-center gap-2"><RefreshCw className="text-emerald-500" /> Life Time Value (Recompras)</h2>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <KpiCard title="Total em Recompras" value={fmtMoney(globalMetrics.totalRep)} subtext={`${repurchases.length} novos pedidos`} icon={DollarSign} colorClass="border-emerald-500" />
                        <KpiCard title="Expansão de Faturamento" value={`+${globalMetrics.expansion.toFixed(1)}%`} subtext="Aumento na Receita Base" icon={TrendingUp} colorClass="border-amber-500" />
                        <KpiCard title="Total Receita c/ LTV" value={fmtMoney(globalMetrics.totalLtv)} subtext="Primeiras Vendas + Recompras" icon={Target} colorClass="border-blue-500" />
                        <KpiCard title="Ciclo Médio" value={`${globalMetrics.avgCycle} dias`} subtext="Diferença 1ª Compra até Recompra" icon={RefreshCw} colorClass="border-purple-500" />
                    </div>
                    <SectionHeader title="Gráficos de Retenção" icon={BarChart3} color="bg-emerald-500" isOpen={isRetentionOpen} onToggle={() => setIsRetentionOpen(!isRetentionOpen)} />
                    {isRetentionOpen && (
                        <div className="space-y-6 mb-8 mt-4 animate-fadeIn">
                            <ChartContainer title="Top 5 Clientes (Recompras)"><ChartComponent type="bar" data={topClientsData} options={{ indexAxis: 'y' }} labelType="money" /></ChartContainer>
                            <ChartContainer title="Evolução Mensal (Recompras)"><ChartComponent type="bar" data={monthlyEvolution} labelType="money" /></ChartContainer>
                            <ChartContainer title="Top Estados (Recompras)"><ChartComponent type="bar" data={topStatesData} labelType="money" /></ChartContainer>
                        </div>
                    )}
                    <div className="glass-panel rounded-lg overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left text-slate-400">
                                <thead className="text-xs text-slate-200 uppercase bg-slate-800/50">
                                    <tr>
                                        <th className="px-6 py-4 sortable" onClick={() => handleSort('company')}>Cliente / Lojista <SortIcon column="company" /></th>
                                        <th className="px-6 py-4 text-center sortable" onClick={() => handleSort('firstDate')}>Data 1ª Compra <SortIcon column="firstDate" /></th>
                                        <th className="px-6 py-4 text-center sortable" onClick={() => handleSort('firstValue')}>Valor 1ª Compra <SortIcon column="firstValue" /></th>
                                        <th className="px-6 py-4 text-center sortable" onClick={() => handleSort('repCount')}>Nº Recompras <SortIcon column="repCount" /></th>
                                        <th className="px-6 py-4 text-center sortable" onClick={() => handleSort('repTotal')}>Valor Extra LTV <SortIcon column="repTotal" /></th>
                                        <th className="px-6 py-4 text-right sortable" onClick={() => handleSort('ltvTotal')}>LTV Total (R$) <SortIcon column="ltvTotal" /></th>
                                        <th className="px-6 py-4 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700/50">
                                    {sortedClients.map((client) => (
                                        <tr key={client.company} className="hover:bg-slate-800/30 transition-colors">
                                            <td className="px-6 py-4">
                                                <div className="font-bold text-white">{client.company}</div>
                                                <div className="text-[10px] text-slate-500">{client.city} - {client.state}</div>
                                            </td>
                                            <td className="px-6 py-4 text-center font-mono text-xs">{fmtDate(client.firstDate)}</td>
                                            <td className="px-6 py-4 text-center"><div className="text-white">{fmtMoney(client.firstValue)}</div><div className="text-[10px] text-slate-500">{client.firstPairs} pares</div></td>
                                            <td className="px-6 py-4 text-center"><span className={`px-2 py-0.5 rounded-full text-[10px] font-bold ${client.repCount > 0 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-400'}`}>{client.repCount > 0 ? `${client.repCount} recompras` : '-'}</span></td>
                                            <td className="px-6 py-4 text-center text-emerald-400 font-medium">{client.repTotal > 0 ? fmtMoney(client.repTotal) : '-'}</td>
                                            <td className="px-6 py-4 text-right font-black text-white">{fmtMoney(client.ltvTotal)}</td>
                                            <td className="px-6 py-4 text-right">
                                                <div className="flex items-center justify-end gap-2">
                                                    <button onClick={() => openCentralModal(client, 'repurchase')} className="flex items-center gap-1 bg-emerald-600/10 text-emerald-400 hover:bg-emerald-600 hover:text-white px-2 py-1.5 rounded text-[10px] font-bold border border-emerald-500/20 transition-all"><Plus size={14} /> Nova Recompra</button>
                                                    <button onClick={() => openCentralModal(client, 'history')} className="p-2 hover:bg-slate-700 rounded text-blue-400" title="Ver Central do Cliente"><Activity size={16} /></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <CustomerCentralModal
                        isOpen={isCentralModalOpen}
                        onClose={() => setIsCentralModalOpen(false)}
                        client={selectedClient}
                        initialTab={centralTab}
                        sales={sales}
                        repurchases={repurchases}
                        onUpdateRetailer={updateRetailer}
                        onAddRepurchase={addRepurchase}
                        onUpdateRepurchase={updateRepurchase}
                        onDeleteRepurchase={deleteRepurchase}
                    />
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('analytics');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(true);
            const [firebaseUser, setFirebaseUser] = useState(null);

            // Auth Effect for Firebase - Conexão
            useEffect(() => {
                if (window.firebaseAuth && window.auth) {
                    const { signInAnonymously, onAuthStateChanged } = window.firebaseAuth;
                    const unsubscribe = onAuthStateChanged(window.auth, (user) => {
                        if (user) {
                            setFirebaseUser(user);
                        } else {
                            signInAnonymously(window.auth).catch(console.error);
                        }
                    });
                    return () => unsubscribe();
                }
            }, []);

            // Hooks conectados ao Firebase (Substituem o useState local)
            const { data: sales, loading: loadingSales, addItem: addSale, updateItem: updateSale, deleteItem: deleteSale } = useFirebaseData('sales', [], firebaseUser);
            const { data: ads, loading: loadingAds, addItem: addAd, updateItem: updateAd, deleteItem: deleteAd } = useFirebaseData('ads', [], firebaseUser);
            const { data: leads, loading: loadingLeads, addItem: addLead, updateItem: updateLead } = useFirebaseData('leads', [], firebaseUser);
            const { data: repurchases, loading: loadingRepurchases, addItem: addRepurchase, updateItem: updateRepurchase, deleteItem: deleteRepurchase } = useFirebaseData('repurchases', [], firebaseUser);

            // Sincronização automática de Leads com Lojistas (Vendas) e Migração
            useEffect(() => {
                if (loadingLeads || loadingSales || !leads.length || !window.db) return;

                // MIGRATION_KEY garante que a limpeza pesada dos "contacted" bugados aconteça só UMA VEZ
                const MIGRATION_KEY = 'crm_migration_v8';
                const hasMigrated = localStorage.getItem(MIGRATION_KEY);

                if (hasAutoSynced && hasMigrated) return;

                const { writeBatch, doc } = window.firebaseStore;
                const batch = writeBatch(window.db);
                let count = 0;

                const normalize = (str) => str ? String(str).toLowerCase().trim() : '';
                const cleanNum = (str) => str ? String(str).replace(/\D/g, '') : '';

                leads.forEach(lead => {
                    const hasSale = sales.some(s => {
                        const matchCnpj = cleanNum(s.cnpj) && cleanNum(lead.cnpj) && cleanNum(s.cnpj) === cleanNum(lead.cnpj);
                        const matchPhone = cleanNum(s.phone) && cleanNum(lead.phone) && cleanNum(s.phone) === cleanNum(lead.phone);

                        const sComp = normalize(s.company);
                        const lComp = normalize(lead.company);
                        const lCont = normalize(lead.contact);

                        const matchComp = sComp && lComp && sComp === lComp && sComp.length > 2;
                        const matchCont = sComp && lCont && sComp === lCont && sComp.length > 2;

                        return matchCnpj || matchPhone || matchComp || matchCont;
                    });

                    // 1. Forçar para VENDIDO se bateu com alguma venda na Lojistas
                    if (hasSale && lead.status !== 'converted') {
                        const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'leads', String(lead.id));
                        batch.update(docRef, { status: 'converted', isNew: false });
                        count++;
                    }
                    // 2. MIGRAÇÃO: Limpar leads antigos "contacted" que estão inundando o quadro CRM
                    else if (!hasMigrated && !hasSale && ['contacted', 'negotiating', 'qualified'].includes(lead.status)) {
                        const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'leads', String(lead.id));
                        batch.update(docRef, { status: 'read', isNew: false });
                        count++;
                    }
                });

                if (count > 0) {
                    console.log(`Migração Batch: resolvendo ${count} leads pendentes...`);
                    batch.commit()
                        .then(() => {
                            localStorage.setItem(MIGRATION_KEY, 'true');
                            setHasAutoSynced(true);
                            if (!hasMigrated) window.location.reload();
                        })
                        .catch(err => {
                            console.error("Erro na migração batch:", err);
                            localStorage.setItem(MIGRATION_KEY, 'true');
                            setHasAutoSynced(true);
                        });
                } else {
                    localStorage.setItem(MIGRATION_KEY, 'true');
                    setHasAutoSynced(true);
                }
            }, [sales, leads.length, hasAutoSynced, loadingLeads, loadingSales]);

            const [prefillData, setPrefillData] = useState(null);
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [credentials, setCredentials] = useState({ username: 'ricomilitar', password: 'admin' });
            const [loginError, setLoginError] = useState('');
            const [newLeadAlert, setNewLeadAlert] = useState(false);
            const [leadsApiUrl, setLeadsApiUrl] = useState('https://script.google.com/macros/s/AKfycbx-Vr1TbLdJoXM7Y1pusPzQau7eJFhfqVDsjhCEissJ3-JFJPJ1mSweoKrpiRMp0geznQ/exec');
            const [hasAutoSynced, setHasAutoSynced] = useState(false);
            const activeLookups = useRef(new Set());

            const idealProfile = useMemo(() => getIdealProfile(sales), [sales]);

            // Função para Restaurar os Dados Originais no Firebase (se estiver vazio)
            const importInitialData = async () => {
                if (window.db && firebaseUser) {
                    const batchPromises = [];
                    // Loop simples para inserir os dados iniciais um por um
                    for (const s of INITIAL_SALES) { batchPromises.push(addSale(s)); }
                    for (const a of INITIAL_ADS) { batchPromises.push(addAd(a)); }

                    await Promise.all(batchPromises);
                    // Leads vazios inicialmente, mas se tiver na lista, adicionaria aqui
                    // alert("Dados restaurados com sucesso! Os gráficos devem aparecer agora."); // Comentado para ser silencioso
                }
            };

            // AUTO-SEED: Verifica se o banco está vazio e popula automaticamente
            useEffect(() => {
                // Só executa se o usuário estiver logado e o carregamento tiver terminado
                if (firebaseUser && !loadingSales && !loadingAds) {
                    // Se não houver vendas nem anúncios, assume banco vazio e carrega os dados iniciais
                    if (sales.length === 0 && ads.length === 0) {
                        console.log("Banco vazio detectado. Carregando dados iniciais automaticamente...");
                        importInitialData();
                    }
                }
            }, [firebaseUser, loadingSales, loadingAds, sales.length, ads.length]);

            const syncFromApi = async () => {
                if (!leadsApiUrl) {
                    // Modo simulação se não houver URL
                    const incomingLead = { id: Date.now(), date: new Date().toISOString().split('T')[0], name: 'Novo Cliente Simulado', contact: 'Lead Demo', city: 'Belo Horizonte', state: 'MG', source: 'Simulação Demo', status: 'new', isNew: true };
                    await addLead(incomingLead);
                    setNewLeadAlert(true);
                    return;
                }
                try {
                    const response = await fetch(leadsApiUrl);
                    const data = await response.json();

                    const newLeads = data.map((item, index) => {
                        const getVal = (key) => {
                            if (item[key] !== undefined) return item[key];
                            const foundKey = Object.keys(item).find(k => k.trim().toLowerCase().includes(key.toLowerCase()));
                            return foundKey ? item[foundKey] : '';
                        };
                        const dateRaw = getVal('Carimbo') || getVal('Data') || new Date();
                        const dateObj = dateRaw ? new Date(dateRaw) : new Date();
                        const today = new Date().toISOString().split('T')[0];
                        const leadDate = dateObj.toISOString().split('T')[0];

                        // Considerar NOVO apenas se for de HOJE em diante
                        const isHistoricallyOld = leadDate < today;

                        return {
                            date: leadDate,
                            company: getVal('Razão Social'),
                            contact: getVal('Nome'),
                            phone: getVal('whatsapp'),
                            email: getVal('mail'),
                            city: getVal('Cidade'),
                            state: normalizeUF(getVal('Estado')),
                            cnpj: getVal('CNPJ'),
                            ie: getVal('Inscrição'),
                            address: getVal('Endereço'),
                            instagram: getVal('Instagram'),
                            obs: getVal('Observações'),
                            source: 'Google Forms',
                            status: isHistoricallyOld ? 'read' : 'new',
                            isNew: !isHistoricallyOld
                        };
                    });

                    // Verifica duplicatas simples pelo nome+data antes de adicionar
                    // (Em produção idealmente verificaria ID no banco, mas aqui simplificamos para o demo)
                    let count = 0;
                    const existingSignatures = new Set(leads.map(l => (l.contact || l.name) + l.date));

                    const leadsToAdd = [];
                    for (const l of newLeads) {
                        const sig = (l.contact || l.name) + l.date;
                        if (!existingSignatures.has(sig)) {
                            leadsToAdd.push(addLead(l));
                            count++;
                        }
                    }

                    if (leadsToAdd.length > 0) {
                        await Promise.all(leadsToAdd);
                        setNewLeadAlert(true);
                    }

                } catch (error) {
                    console.error("Erro ao buscar leads:", error);
                    // Não alertar erro silenciosamente no auto-sync
                }
            };

            // AUTO-SYNC LEADS
            useEffect(() => {
                if (firebaseUser && !loadingLeads && !hasAutoSynced && leadsApiUrl) {
                    syncFromApi();
                    setHasAutoSynced(true);
                }
            }, [firebaseUser, loadingLeads, hasAutoSynced, leadsApiUrl]);

            // CORREÇÃO INICIAL: Libera leads presos em isConsulting=true de sessões anteriores
            // E também libera leads marcados com cnpjError (possível limitação da API 429) para retentativa
            useEffect(() => {
                if (!firebaseUser || loadingLeads || !leads.length) return;
                const stuckOrErrored = leads.filter(l => (l.isConsulting && !l.cnpjConsulted) || (l.cnpjError && l.cnpjConsulted && !l.officialName));
                if (stuckOrErrored.length > 0) {
                    stuckOrErrored.forEach(l => updateLead({ ...l, isConsulting: false, cnpjConsulted: false, cnpjError: false }));
                }
            }, [firebaseUser, loadingLeads]); // Roda apenas uma vez ao carregar

            // BACKGROUND WORKER: Consulta Automática de CNPJ (publica.cnpj.ws - suporta CORS)

            useEffect(() => {
                if (!firebaseUser || loadingLeads || !leads.length) return;

                // Consulta apenas os 20 leads mais recentes com CNPJ válido
                const parseDateBR = (dStr) => {
                    if (!dStr) return 0;
                    if (dStr.includes('T') || dStr.includes('-')) return new Date(dStr).getTime();
                    const parts = dStr.split('/');
                    if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]).getTime();
                    return 0;
                };

                const top20RecentIds = [...leads]
                    .filter(l => String(l.cnpj || '').replace(/\D/g, '').length === 14)
                    .sort((a, b) => parseDateBR(b.date) - parseDateBR(a.date))
                    .slice(0, 20)
                    .map(l => l.id);

                const PENDING_LOOKUP = leads.find(l => {
                    const cleanCnpj = String(l.cnpj || '').replace(/\D/g, '');
                    return cleanCnpj.length === 14
                        && !l.cnpjConsulted
                        && !l.isConsulting
                        && !activeLookups.current.has(cleanCnpj)
                        && top20RecentIds.includes(l.id);
                });

                if (!PENDING_LOOKUP) return;

                const runLookup = async () => {
                    const cnpj = String(PENDING_LOOKUP.cnpj).replace(/\D/g, '');
                    if (activeLookups.current.has(cnpj)) return;
                    activeLookups.current.add(cnpj);

                    // Atualiza localmente para mostrar ícone de carregamento
                    updateLead({ ...PENDING_LOOKUP, isConsulting: true });

                    try {
                        const parsedData = await fetchCnpjData(cnpj);
                        await updateLead({
                            ...PENDING_LOOKUP,
                            ...parsedData,
                            cnpjConsulted: true,
                            isConsulting: false,
                            cnpjError: false
                        });
                    } catch (err) {
                        console.error('Erro no lookup de CNPJ background:', err);
                        if (err.message === "429") {
                            // Erro de limite. NÃO marca como consultado, para rodar depois
                            await updateLead({ ...PENDING_LOOKUP, isConsulting: false, cnpjError: true });
                        } else {
                            // Não existe na receita. Marca como definitivo com erro.
                            await updateLead({ ...PENDING_LOOKUP, cnpjConsulted: true, isConsulting: false, cnpjError: true });
                        }
                    } finally {
                        setTimeout(() => activeLookups.current.delete(cnpj), 5000);
                    }
                };

                // 15 segundos entre consultas automáticas - previne ban de IP em APIs gratuitas
                const timeout = setTimeout(runLookup, 15000); 
                return () => clearTimeout(timeout);
            }, [leads, firebaseUser, loadingLeads]);

            // AUTO-CHECK: Checa novos leads a cada 5 minutos
            useEffect(() => {
                if (!isAuthenticated || !leadsApiUrl) return;

                const interval = setInterval(() => {
                    console.log("Verificação automática de leads (5min)...");
                    syncFromApi();
                }, 5 * 60 * 1000);

                return () => clearInterval(interval);
            }, [isAuthenticated, leadsApiUrl, leads]); // Dependência 'leads' recria o intervalo quando leads mudam, garantindo closure atualizado

            const handleLogin = (u, p) => { if (u === credentials.username && p === credentials.password) { setIsAuthenticated(true); setView('leads'); setLoginError(''); } else { setLoginError('Credenciais inválidas. Tente novamente.'); } };
            const handleLogout = () => { setIsAuthenticated(false); setView('analytics'); };
            const handleUpdateCredentials = (u, p) => { setCredentials({ username: u, password: p }); };
            const handleAcknowledgeLead = () => { setNewLeadAlert(false); setView('leads'); };
            const handleConvertToSale = (lead) => {
                setPrefillData(lead);
                setView('retailers');
            };

            const newLeadsCount = leads.filter(l => l.status === 'new').length;

            if (!isAuthenticated) return <LoginView onLogin={handleLogin} loginError={loginError} />;
            return (
                <div className="flex bg-[#0f172a] min-h-screen text-slate-200">
                    <Sidebar
                        view={view}
                        setView={setView}
                        onLogout={handleLogout}
                        notificationCount={newLeadsCount}
                        isCollapsed={isSidebarCollapsed}
                        toggleSidebar={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                    />
                    <main className={`flex-1 p-8 overflow-y-auto h-screen relative transition-all duration-300 ${isSidebarCollapsed ? 'ml-20' : 'ml-64'}`}>
                        {/* Botão de Emergência para Restaurar Dados se estiver vazio */}
                        {sales.length === 0 && ads.length === 0 && leads.length === 0 && (
                            <div className="mb-6 p-4 bg-amber-500/10 border border-amber-500/50 rounded-lg flex items-center justify-between animate-fadeIn">
                                <div className="text-amber-500 flex items-center gap-2"><DatabaseIcon size={20} /> <span>Banco de dados vazio? O carregamento automático deve iniciar em breve...</span></div>
                                <button onClick={importInitialData} className="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded font-bold text-sm shadow-lg transition-transform hover:scale-105">Forçar Restauração</button>
                            </div>
                        )}

                        {view === 'analytics' && <AnalyticsView sales={sales} ads={ads} leads={leads} repurchases={repurchases} />}
                        {view === 'lead-analytics' && <LeadAnalyticsView sales={sales} leads={leads} ads={ads} />}
                        {view === 'leads' && <LeadsView leads={leads} sales={sales} deleteSale={deleteSale} addItem={addLead} updateItem={updateLead} onConvertToSale={handleConvertToSale} clearNotification={() => setNewLeadAlert(false)} onSync={syncFromApi} apiUrl={leadsApiUrl} profile={idealProfile} />}
                        {view === 'crm' && <CRMView leads={leads} sales={sales} updateItem={updateLead} onConvertToSale={handleConvertToSale} deleteSale={deleteSale} />}
                        {view === 'retailers' && <RetailersView 
                            sales={sales} 
                            addItem={addSale} 
                            updateItem={updateSale} 
                            deleteItem={deleteSale} 
                            prefillData={prefillData} 
                            setPrefillData={setPrefillData} 
                            updateLead={updateLead} 
                            leads={leads}
                            repurchases={repurchases}
                            addRepurchase={addRepurchase}
                            updateRepurchase={updateRepurchase}
                            deleteRepurchase={deleteRepurchase}
                        />}
                        {view === 'ltv' && <LTVView 
                            sales={sales} 
                            repurchases={repurchases} 
                            addRepurchase={addRepurchase} 
                            updateRepurchase={updateRepurchase} 
                            deleteRepurchase={deleteRepurchase} 
                            updateRetailer={updateSale}
                        />}
                        {view === 'ads' && <AdsView ads={ads} addItem={addAd} updateItem={updateAd} deleteItem={deleteAd} />}
                        {view === 'settings' && <SettingsView credentials={credentials} onUpdateCredentials={handleUpdateCredentials} apiUrl={leadsApiUrl} onUpdateApiUrl={setLeadsApiUrl} importData={importInitialData} onCleanTags={() => {
                            if (!window.db || !leads.length) return;
                            const { writeBatch, doc } = window.firebaseStore;
                            const batch = writeBatch(window.db);
                            let count = 0;

                            leads.forEach(l => {
                                // Limpar TUDO que não for negociação ativa ou venda confirmada
                                if (['new', 'read', 'contacted'].includes(l.status) || l.isNew) {
                                    const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'leads', String(l.id));
                                    batch.update(docRef, { isNew: false, status: 'read' });
                                    count++;
                                }
                            });

                            if (count > 0) {
                                batch.commit()
                                    .then(() => alert(`Limpeza concluída! ${count} leads movidos para LIDO.`))
                                    .catch(err => alert("Erro na limpeza: " + err.message));
                            } else {
                                alert('Nenhum lead pendente para limpeza.');
                            }
                        }} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
